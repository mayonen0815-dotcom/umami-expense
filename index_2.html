<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うま味経費精算</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f8fafc;color:#0f172a}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.logo-text{font-weight:700;font-size:14px;color:#0f172a}
.logo-sub{font-size:11px;color:#94a3b8}
nav{flex:1;padding:10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#475569;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:#f1f5f9;color:#0f172a}
.nav-item.active{background:#eff6ff;color:#2563eb}
.sidebar-user{padding:14px 16px;border-top:1px solid #e2e8f0}
.user-info{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.user-avatar{width:32px;height:32px;background:#e2e8f0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#475569}
.user-name{font-size:13px;font-weight:600;color:#0f172a}
.role-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;margin-top:2px}
.role-staff{background:#dbeafe;color:#1d4ed8}
.role-manager{background:#ede9fe;color:#6d28d9}
.role-office{background:#dcfce7;color:#15803d}
.logout-btn{background:none;border:none;color:#94a3b8;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 0}
.logout-btn:hover{color:#0f172a}
.main{flex:1;overflow-y:auto}
.page{padding:28px;max-width:900px;margin:0 auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:20px;font-weight:700;color:#0f172a}
.page-sub{font-size:13px;color:#64748b;margin-top:2px}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#fff;color:#374151;border:1px solid #e2e8f0}
.btn-secondary:hover{background:#f8fafc}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-success{background:#16a34a;color:#fff}
.btn-success:hover{background:#15803d}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.stat-value{font-size:26px;font-weight:700;color:#0f172a}
.stat-label{font-size:12px;color:#64748b;margin-top:2px}
.table-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden}
.table-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:#f8fafc}
.table-header{display:flex;align-items:center;padding:10px 18px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge-draft{background:#f1f5f9;color:#475569}
.badge-pending{background:#fef9c3;color:#854d0e}
.badge-approved{background:#dcfce7;color:#15803d}
.badge-rejected{background:#fee2e2;color:#991b1b}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.form-input{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;color:#0f172a;outline:none;transition:border .15s}
.form-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.login-wrap{min-height:100vh;background:linear-gradient(135deg,#1e3a8a,#2563eb,#3b82f6);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{width:56px;height:56px;background:#2563eb;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px}
.login-title{font-size:22px;font-weight:700;color:#0f172a}
.login-sub{font-size:13px;color:#64748b;margin-top:4px}
.error-msg{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
.divider{border:none;border-top:1px solid #f1f5f9;margin:16px 0}
.approval-flow{display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:14px 18px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0}
.flow-step{text-align:center;font-size:12px}
.flow-step-name{font-weight:600;color:#0f172a}
.flow-step-role{color:#64748b;font-size:11px}
.flow-arrow{color:#94a3b8;font-size:18px}
.flow-step.active .flow-step-name{color:#2563eb}
.flow-step.done .flow-step-name{color:#16a34a}
.log-item{display:flex;gap:12px;margin-bottom:14px}
.log-avatar{width:30px;height:30px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#475569;flex-shrink:0}
.log-content{flex:1}
.log-meta{font-size:12px;color:#64748b}
.log-comment{font-size:13px;color:#374151;margin-top:3px}
.action-approve{color:#16a34a;font-weight:600}
.action-reject{color:#dc2626;font-weight:600}
.action-submit{color:#2563eb;font-weight:600}
.empty{padding:50px;text-align:center;color:#94a3b8;font-size:14px}
.receipt-preview{max-width:280px;border-radius:8px;border:1px solid #e2e8f0;margin-top:8px}
.upload-area{border:2px dashed #e2e8f0;border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:all .15s}
.upload-area:hover{border-color:#2563eb;background:#eff6ff}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:13px;color:#64748b}
.donut-wrap{display:flex;gap:24px;align-items:center}
.legend{flex:1}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{flex:1;color:#374151}
.legend-pct{color:#64748b;font-size:12px}
.legend-amt{font-weight:600;color:#0f172a;text-align:right;min-width:80px}
.filter-row{display:flex;gap:10px;margin-bottom:16px}
.search-wrap{position:relative;flex:1}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px}
.search-input{padding-left:32px!important}
@media(max-width:700px){
  .sidebar{display:none}
  .stats{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
}
.mobile-header{display:none;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-bottom:1px solid #e2e8f0}
@media(max-width:700px){.mobile-header{display:flex}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ===== CONFIG =====
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_KEY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== CONSTANTS =====
const CATEGORIES = [
  {value:'transport',label:'交通費'},
  {value:'meal',label:'食費・接待費'},
  {value:'accommodation',label:'宿泊費'},
  {value:'supplies',label:'備品・消耗品'},
  {value:'communication',label:'通信費'},
  {value:'other',label:'その他'},
];
const STATUS = {
  draft:{label:'下書き',badge:'badge-draft'},
  pending_manager:{label:'マネージャー承認待ち',badge:'badge-pending'},
  pending_office:{label:'事務所承認待ち',badge:'badge-pending'},
  approved:{label:'承認済み',badge:'badge-approved'},
  rejected:{label:'却下',badge:'badge-rejected'},
};
const ROLE_LABELS = {staff:'現場',manager:'マネージャー',office:'事務所'};
const ROLE_BADGE = {staff:'role-staff',manager:'role-manager',office:'role-office'};
const CAT_COLORS = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#6366f1'];

function fmt(n){return new Intl.NumberFormat('ja-JP',{style:'currency',currency:'JPY'}).format(n)}
function fmtDate(d){if(!d)return'---';return new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})}
function getCat(v){return CATEGORIES.find(c=>c.value===v)?.label||v}

// ===== BADGE =====
function Badge({status}){
  const s=STATUS[status]||{label:status,badge:'badge-draft'};
  return <span className={`badge ${s.badge}`}>{s.label}</span>
}

// ===== LOGIN =====
function Login({onLogin}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  async function handle(e){
    e.preventDefault();setLoading(true);setErr('');
    const {error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){setErr('メールアドレスまたはパスワードが正しくありません');setLoading(false);}
  }
  return(
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-icon">🧾</div>
          <div className="login-title">うま味経費精算</div>
          <div className="login-sub">Expense Manager</div>
        </div>
        <form onSubmit={handle}>
          {err&&<div className="error-msg">{err}</div>}
          <div className="form-group">
            <label className="form-label">メールアドレス</label>
            <input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="example@company.com" required/>
          </div>
          <div className="form-group">
            <label className="form-label">パスワード</label>
            <input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required/>
          </div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px'}} disabled={loading}>
            {loading?'ログイン中...':'ログイン'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ===== DASHBOARD =====
function Dashboard({profile}){
  const [stats,setStats]=useState({total:0,pending:0,approved:0,rejected:0});
  const [recent,setRecent]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{fetch()},[]);
  async function fetch(){
    let q=sb.from('expenses').select('*');
    if(profile.role==='staff')q=q.eq('user_id',profile.id);
    const {data}=await q.order('created_at',{ascending:false}).limit(5);
    setRecent(data||[]);
    let sq=sb.from('expenses').select('status');
    if(profile.role==='staff')sq=sq.eq('user_id',profile.id);
    const {data:all}=await sq;
    if(all)setStats({
      total:all.length,
      pending:all.filter(e=>e.status.startsWith('pending')).length,
      approved:all.filter(e=>e.status==='approved').length,
      rejected:all.filter(e=>e.status==='rejected').length,
    });
    setLoading(false);
  }
  const cards=[
    {label:'総件数',value:stats.total,icon:'📋',bg:'#eff6ff'},
    {label:'承認待ち',value:stats.pending,icon:'⏳',bg:'#fefce8'},
    {label:'承認済み',value:stats.approved,icon:'✅',bg:'#f0fdf4'},
    {label:'却下',value:stats.rejected,icon:'❌',bg:'#fef2f2'},
  ];
  return(
    <div className="page">
      <div className="page-header">
        <div>
          <div className="page-title">ダッシュボード</div>
          <div className="page-sub">こんにちは、{profile.name} さん</div>
        </div>
      </div>
      <div className="stats">
        {cards.map(c=>(
          <div className="stat-card" key={c.label}>
            <div className="stat-icon" style={{background:c.bg}}>{c.icon}</div>
            <div className="stat-value">{loading?'—':c.value}</div>
            <div className="stat-label">{c.label}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',borderBottom:'1px solid #f1f5f9'}}>
          <span style={{fontWeight:600,fontSize:14}}>最近の申請</span>
        </div>
        {loading?<div className="empty">読み込み中...</div>:recent.length===0?<div className="empty">申請がありません</div>:
          recent.map(e=>(
            <div className="table-row" key={e.id}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>{e.title}</div>
                <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{fmtDate(e.expense_date)}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:13,fontWeight:700}}>{fmt(e.amount)}</span>
                <Badge status={e.status}/>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ===== EXPENSE LIST =====
function ExpenseList({profile,onSelect,onNew}){
  const [expenses,setExpenses]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [statusFilter,setStatusFilter]=useState('');
  useEffect(()=>{fetchData()},[]);
  async function fetchData(){
    setLoading(true);
    let q=sb.from('expenses').select('*,profiles(name)');
    if(profile.role==='staff')q=q.eq('user_id',profile.id);
    const {data}=await q.order('created_at',{ascending:false});
    setExpenses(data||[]);setLoading(false);
  }
  const [showExportMenu,setShowExportMenu]=useState(false);

  function exportCSV(){
    const filtered=getFiltered();
    const rows=[['タイトル','金額','カテゴリ','日付','ステータス','申請者'],
      ...filtered.map(e=>[e.title,e.amount,getCat(e.category),e.expense_date,STATUS[e.status]?.label||e.status,e.profiles?.name||''])];
    const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`expenses_${new Date().toISOString().slice(0,10)}.csv`;a.click();
    setShowExportMenu(false);
  }

  function exportPDF(){
    const filtered=getFiltered();
    const today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
    // カテゴリ別に分類
    const byCategory={
      transport: filtered.filter(e=>e.category==='transport'),
      accommodation: filtered.filter(e=>e.category==='accommodation'),
      meal: filtered.filter(e=>e.category==='meal'),
      other: filtered.filter(e=>['supplies','communication','other'].includes(e.category)),
    };
    const catLabels={transport:'交通費',accommodation:'宿泊費',meal:'食費・接待費',other:'その他'};
    const total=filtered.reduce((s,e)=>s+e.amount,0);
    const applicant=profile.name;

    // 各カテゴリの行を生成（最大5行）
    function makeRows(items,max=5){
      const rows=[];
      for(let i=0;i<max;i++){
        const e=items[i];
        rows.push(`
          <tr>
            <td>${e?e.expense_date:''}</td>
            <td style="text-align:right">${e?'¥'+e.amount.toLocaleString():''}</td>
            <td>${e?e.title:''}</td>
          </tr>`);
      }
      return rows.join('');
    }

    function catTotal(items){
      return items.reduce((s,e)=>s+e.amount,0);
    }

    const html=`<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  body{font-family:'MS Gothic','Hiragino Sans',sans-serif;font-size:12px;margin:20px}
  h2{text-align:center;font-size:16px;margin-bottom:16px}
  .header-row{display:flex;justify-content:space-between;margin-bottom:12px}
  .total-box{border:2px solid #000;padding:4px 16px;font-size:14px;font-weight:bold}
  table{width:100%;border-collapse:collapse;margin-bottom:12px}
  th,td{border:1px solid #000;padding:4px 8px}
  th{background:#d9d9d9;text-align:center}
  .cat-header{background:#f0f0f0;font-weight:bold}
  .subtotal{text-align:right;font-weight:bold}
  @media print{body{margin:0}}
</style>
</head>
<body>
<h2>UMAMI経費精算</h2>
<div class="header-row">
  <div>申請日：${today}</div>
  <div class="total-box">合計 ¥${total.toLocaleString()}</div>
</div>
<div style="margin-bottom:12px">申請者：${applicant}</div>

${Object.entries(byCategory).map(([key,items],idx)=>`
<table>
  <thead>
    <tr class="cat-header">
      <th style="width:120px">日付</th>
      <th style="width:100px">⑥${idx+1}${catLabels[key]}</th>
      <th>内容</th>
    </tr>
  </thead>
  <tbody>
    ${makeRows(items)}
    <tr>
      <td colspan="2" class="subtotal">小計 ¥${catTotal(items).toLocaleString()}</td>
      <td></td>
    </tr>
  </tbody>
</table>`).join('')}

<script>window.onload=function(){window.print()}<\/script>
</body>
</html>`;

    const blob=new Blob([html],{type:'text/html;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    setShowExportMenu(false);
  }
  function getFiltered(){
    return expenses.filter(e=>{
      const ms=!search||e.title.toLowerCase().includes(search.toLowerCase());
      const mf=!statusFilter||e.status===statusFilter;
      return ms&&mf;
    });
  }
  const filtered=getFiltered();
  return(
    <div className="page">
      <div className="page-header">
        <div className="page-title">経費一覧</div>
        <div style={{display:'flex',gap:8}}>
          <div style={{position:'relative'}}>
            <button className="btn btn-secondary" onClick={()=>setShowExportMenu(!showExportMenu)}>📥 出力 ▾</button>
            {showExportMenu&&(
              <div style={{position:'absolute',right:0,top:'110%',background:'#fff',border:'1px solid #e2e8f0',borderRadius:8,boxShadow:'0 4px 12px rgba(0,0,0,.1)',zIndex:100,minWidth:140}}>
                <button onClick={exportCSV} style={{display:'block',width:'100%',padding:'10px 16px',border:'none',background:'none',textAlign:'left',cursor:'pointer',fontSize:13,borderBottom:'1px solid #f1f5f9'}}>📊 Excel（CSV）</button>
                <button onClick={exportPDF} style={{display:'block',width:'100%',padding:'10px 16px',border:'none',background:'none',textAlign:'left',cursor:'pointer',fontSize:13}}>📄 PDF（ひな形）</button>
              </div>
            )}
          </div>
          {profile.role==='staff'&&<button className="btn btn-primary" onClick={onNew}>＋ 申請</button>}
        </div>
      </div>
      <div className="filter-row">
        <div className="search-wrap">
          <span className="search-icon">🔍</span>
          <input className="form-input search-input" placeholder="タイトルで検索..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="form-input" style={{width:180}} value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
          <option value="">全ステータス</option>
          {Object.entries(STATUS).map(([v,s])=><option key={v} value={v}>{s.label}</option>)}
        </select>
      </div>
      <div className="table-wrap">
        {loading?<div className="empty">読み込み中...</div>:filtered.length===0?<div className="empty">申請がありません</div>:
          filtered.map(e=>(
            <div className="table-row" key={e.id} onClick={()=>onSelect(e.id)}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>{e.title}</div>
                <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{getCat(e.category)} · {fmtDate(e.expense_date)}{profile.role!=='staff'&&e.profiles?.name&&` · ${e.profiles.name}`}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:13,fontWeight:700}}>{fmt(e.amount)}</span>
                <Badge status={e.status}/>
                <span style={{color:'#cbd5e1'}}>›</span>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ===== EXPENSE FORM =====
function ExpenseForm({profile,expenseId,onSave,onCancel}){
  const [form,setForm]=useState({title:'',amount:'',category:'transport',expense_date:new Date().toISOString().slice(0,10),description:'',receipt_url:''});
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState('');
  const [loading,setLoading]=useState(false);
  const isEdit=!!expenseId;
  useEffect(()=>{if(isEdit)loadExpense()},[expenseId]);
  async function loadExpense(){
    const {data}=await sb.from('expenses').select('*').eq('id',expenseId).single();
    if(data){setForm({title:data.title,amount:data.amount,category:data.category,expense_date:data.expense_date,description:data.description||'',receipt_url:data.receipt_url||''});
    if(data.receipt_url)setPreview(data.receipt_url);}
  }
  function handleFile(e){
    const f=e.target.files[0];if(!f)return;
    setFile(f);setPreview(URL.createObjectURL(f));
  }
  async function uploadFile(){
    if(!file)return form.receipt_url;
    const ext=file.name.split('.').pop();
    const path=`receipts/${profile.id}/${Date.now()}.${ext}`;
    await sb.storage.from('receipts').upload(path,file);
    const {data:{publicUrl}}=sb.storage.from('receipts').getPublicUrl(path);
    return publicUrl;
  }
  async function handleSubmit(submitForApproval){
    setLoading(true);
    try{
      const receipt_url=await uploadFile();
      const payload={...form,amount:Number(form.amount),receipt_url,user_id:profile.id,status:submitForApproval?'pending_manager':'draft'};
      if(isEdit)await sb.from('expenses').update(payload).eq('id',expenseId);
      else await sb.from('expenses').insert(payload);
      onSave();
    }catch(e){alert('保存失敗: '+e.message);}
    setLoading(false);
  }
  return(
    <div className="page">
      <div className="page-header">
        <div>
          <button className="btn btn-secondary" onClick={onCancel}>← 戻る</button>
        </div>
      </div>
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:20}}>{isEdit?'経費を編集':'経費を申請'}</h2>
      <div className="card" style={{padding:24,marginBottom:16}}>
        <div className="form-group">
          <label className="form-label">タイトル *</label>
          <input className="form-input" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="例: 東京出張 交通費"/>
        </div>
        <div className="form-grid">
          <div className="form-group">
            <label className="form-label">金額（円）*</label>
            <input className="form-input" type="number" min="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0"/>
          </div>
          <div className="form-group">
            <label className="form-label">日付 *</label>
            <input className="form-input" type="date" value={form.expense_date} onChange={e=>setForm(f=>({...f,expense_date:e.target.value}))}/>
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">カテゴリ</label>
          <select className="form-input" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
            {CATEGORIES.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">摘要</label>
          <textarea className="form-input" rows={3} style={{resize:'none'}} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="詳細・メモ（任意）"/>
        </div>
      </div>
      <div className="card" style={{padding:24,marginBottom:20}}>
        <label className="form-label">領収書</label>
        {preview?(
          <div>
            <img src={preview} className="receipt-preview" alt="領収書"/>
            <br/>
            <button className="btn btn-secondary" style={{marginTop:8,fontSize:12}} onClick={()=>{setPreview('');setFile(null);setForm(f=>({...f,receipt_url:''}))}}>🗑 削除</button>
          </div>
        ):(
          <label className="upload-area">
            <div className="upload-icon">📎</div>
            <div className="upload-text">クリックして画像を選択<br/><span style={{fontSize:11,color:'#94a3b8'}}>PNG, JPG, PDF</span></div>
            <input type="file" style={{display:'none'}} accept="image/*,.pdf" onChange={handleFile}/>
          </label>
        )}
      </div>
      <div style={{display:'flex',gap:10}}>
        <button className="btn btn-secondary" style={{flex:1,justifyContent:'center'}} onClick={()=>handleSubmit(false)} disabled={loading}>下書き保存</button>
        <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={()=>handleSubmit(true)} disabled={loading}>{loading?'処理中...':'申請する'}</button>
      </div>
    </div>
  );
}

// ===== EXPENSE DETAIL =====
function ExpenseDetail({profile,expenseId,onBack,onEdit}){
  const [expense,setExpense]=useState(null);
  const [logs,setLogs]=useState([]);
  const [comment,setComment]=useState('');
  const [loading,setLoading]=useState(false);
  useEffect(()=>{loadData()},[expenseId]);
  async function loadData(){
    const [{data:exp},{data:lg}]=await Promise.all([
      sb.from('expenses').select('*,profiles(name)').eq('id',expenseId).single(),
      sb.from('approval_logs').select('*,profiles(name)').eq('expense_id',expenseId).order('created_at'),
    ]);
    setExpense(exp);setLogs(lg||[]);
  }
  async function doAction(action){
    setLoading(true);
    const next={manager:{approve:'pending_office',reject:'rejected'},office:{approve:'approved',reject:'rejected'}};
    const newStatus=action==='submit'?'pending_manager':next[profile.role]?.[action];
    await sb.from('expenses').update({status:newStatus}).eq('id',expenseId);
    await sb.from('approval_logs').insert({expense_id:expenseId,actor_id:profile.id,action,comment,from_status:expense.status,to_status:newStatus});
    setComment('');await loadData();setLoading(false);
  }
  async function doDelete(){
    if(!confirm('削除しますか？'))return;
    await sb.from('expenses').delete().eq('id',expenseId);
    onBack();
  }
  if(!expense)return<div className="empty">読み込み中...</div>;
  const canApprove=(profile.role==='manager'&&expense.status==='pending_manager')||(profile.role==='office'&&expense.status==='pending_office');
  const canSubmit=profile.role==='staff'&&expense.status==='draft';
  const canEdit=profile.role==='staff'&&['draft','rejected'].includes(expense.status)&&expense.user_id===profile.id;

  // Flow indicator
  const steps=[
    {label:'現場',role:'staff',active:expense.status==='draft',done:expense.status!=='draft'},
    {label:'マネージャー',role:'manager',active:expense.status==='pending_manager',done:['pending_office','approved'].includes(expense.status)},
    {label:'事務所',role:'office',active:expense.status==='pending_office',done:expense.status==='approved'},
  ];

  return(
    <div className="page">
      <button className="btn btn-secondary" onClick={onBack} style={{marginBottom:20}}>← 戻る</button>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:700}}>{expense.title}</h2>
          <div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>申請者: {expense.profiles?.name}</div>
        </div>
        <Badge status={expense.status}/>
      </div>

      {expense.status!=='rejected'&&(
        <div className="approval-flow">
          {steps.map((s,i)=>(
            <React.Fragment key={s.role}>
              <div className={`flow-step ${s.active?'active':''} ${s.done?'done':''}`}>
                <div className="flow-step-name">{s.done?'✅':s.active?'🔵':'⭕'} {s.label}</div>
              </div>
              {i<steps.length-1&&<span className="flow-arrow">→</span>}
            </React.Fragment>
          ))}
        </div>
      )}

      <div className="card" style={{padding:20,marginBottom:14}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          {[['金額',fmt(expense.amount)],['カテゴリ',getCat(expense.category)],['日付',fmtDate(expense.expense_date)],['登録日',fmtDate(expense.created_at)]].map(([k,v])=>(
            <div key={k}><div style={{fontSize:11,color:'#94a3b8',marginBottom:2}}>{k}</div><div style={{fontSize:13,fontWeight:600}}>{v}</div></div>
          ))}
        </div>
        {expense.description&&<div style={{marginTop:14,paddingTop:14,borderTop:'1px solid #f1f5f9'}}><div style={{fontSize:11,color:'#94a3b8',marginBottom:4}}>摘要</div><div style={{fontSize:13}}>{expense.description}</div></div>}
      </div>

      {expense.receipt_url&&(
        <div className="card" style={{padding:16,marginBottom:14}}>
          <div style={{fontSize:11,color:'#94a3b8',marginBottom:8}}>領収書</div>
          <a href={expense.receipt_url} target="_blank" rel="noreferrer">
            <img src={expense.receipt_url} className="receipt-preview" alt="領収書"/>
          </a>
        </div>
      )}

      {logs.length>0&&(
        <div className="card" style={{padding:20,marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>承認履歴</div>
          {logs.map(l=>(
            <div className="log-item" key={l.id}>
              <div className="log-avatar">{l.profiles?.name?.[0]}</div>
              <div className="log-content">
                <div className="log-meta">
                  <span style={{fontWeight:600,color:'#374151'}}>{l.profiles?.name}</span>
                  {' · '}
                  <span className={`action-${l.action}`}>{l.action==='approve'?'承認':l.action==='reject'?'却下':'申請'}</span>
                  {' · '}{fmtDate(l.created_at)}
                </div>
                {l.comment&&<div className="log-comment">{l.comment}</div>}
              </div>
            </div>
          ))}
        </div>
      )}

      {(canApprove||canSubmit||canEdit)&&(
        <div className="card" style={{padding:20}}>
          {canApprove&&(
            <>
              <textarea className="form-input" rows={2} style={{resize:'none',marginBottom:12}} value={comment} onChange={e=>setComment(e.target.value)} placeholder="コメント（任意）"/>
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-danger" style={{flex:1,justifyContent:'center'}} onClick={()=>doAction('reject')} disabled={loading}>❌ 却下</button>
                <button className="btn btn-success" style={{flex:1,justifyContent:'center'}} onClick={()=>doAction('approve')} disabled={loading}>✅ 承認</button>
              </div>
            </>
          )}
          {canSubmit&&<button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>doAction('submit')} disabled={loading}>📤 申請する</button>}
          {canEdit&&(
            <div style={{display:'flex',gap:10,marginTop:canSubmit?12:0,paddingTop:canSubmit?12:0,borderTop:canSubmit?'1px solid #f1f5f9':'none'}}>
              <button className="btn btn-secondary" style={{flex:1,justifyContent:'center'}} onClick={()=>onEdit(expenseId)}>✏️ 編集</button>
              <button className="btn btn-danger" style={{flex:1,justifyContent:'center'}} onClick={doDelete}>🗑 削除</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ===== APPROVAL PAGE =====
function ApprovalPage({profile,onSelect}){
  const [expenses,setExpenses]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{loadData()},[]);
  async function loadData(){
    const targetStatus=profile.role==='manager'?'pending_manager':'pending_office';
    const {data}=await sb.from('expenses').select('*,profiles(name)').eq('status',targetStatus).order('created_at',{ascending:true});
    setExpenses(data||[]);setLoading(false);
  }
  return(
    <div className="page">
      <div className="page-header">
        <div>
          <div className="page-title">承認待ち</div>
          <div className="page-sub">あなたの承認を待っている申請</div>
        </div>
      </div>
      <div className="table-wrap">
        {loading?<div className="empty">読み込み中...</div>:expenses.length===0?(
          <div className="empty">✅ 承認待ちの申請はありません</div>
        ):expenses.map(e=>(
          <div className="table-row" key={e.id} onClick={()=>onSelect(e.id)}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600}}>{e.title}</div>
              <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{e.profiles?.name} · {getCat(e.category)} · {fmtDate(e.expense_date)}</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:13,fontWeight:700}}>{fmt(e.amount)}</span>
              <Badge status={e.status}/>
              <span style={{color:'#cbd5e1'}}>›</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ===== REPORT PAGE =====
function ReportPage({profile}){
  const [month,setMonth]=useState(new Date().toISOString().slice(0,7));
  const [expenses,setExpenses]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{loadData()},[month]);
  async function loadData(){
    setLoading(true);
    const start=month+'-01';
    const end=new Date(new Date(start).getFullYear(),new Date(start).getMonth()+1,0).toISOString().slice(0,10);
    let q=sb.from('expenses').select('*').gte('expense_date',start).lte('expense_date',end).eq('status','approved');
    if(profile.role==='staff')q=q.eq('user_id',profile.id);
    const {data}=await q;
    setExpenses(data||[]);setLoading(false);
  }
  const total=expenses.reduce((s,e)=>s+e.amount,0);
  const byCat=CATEGORIES.map((cat,i)=>{
    const amount=expenses.filter(e=>e.category===cat.value).reduce((s,e)=>s+e.amount,0);
    return{...cat,amount,color:CAT_COLORS[i%CAT_COLORS.length],pct:total?Math.round(amount/total*100):0};
  }).filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount);

  // months dropdown
  const months=Array.from({length:12},(_,i)=>{
    const d=new Date();d.setMonth(d.getMonth()-i);
    return{value:d.toISOString().slice(0,7),label:`${d.getFullYear()}年${d.getMonth()+1}月`};
  });

  // SVG donut
  const r=60,cx=80,cy=80,circ=2*Math.PI*r;
  let offset=0;
  const arcs=byCat.map(cat=>{
    const dash=(cat.pct/100)*circ;
    const el={cat,dash,offset};
    offset+=dash;return el;
  });

  return(
    <div className="page">
      <div className="page-header">
        <div className="page-title">月次レポート</div>
        <select className="form-input" style={{width:160}} value={month} onChange={e=>setMonth(e.target.value)}>
          {months.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
        </select>
      </div>
      {loading?<div className="empty">読み込み中...</div>:expenses.length===0?<div className="empty">この月の承認済み経費はありません</div>:(
        <>
          <div className="card" style={{padding:20,marginBottom:14}}>
            <div style={{fontSize:12,color:'#64748b',marginBottom:4}}>承認済み合計</div>
            <div style={{fontSize:30,fontWeight:700}}>{fmt(total)}</div>
            <div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>{expenses.length}件</div>
          </div>
          {byCat.length>0&&(
            <div className="card" style={{padding:20,marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:16}}>カテゴリ別</div>
              <div className="donut-wrap">
                <svg width="160" height="160">
                  {arcs.map(({cat,dash,offset})=>(
                    <circle key={cat.value} cx={cx} cy={cy} r={r} fill="none" stroke={cat.color} strokeWidth="20"
                      strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-offset}/>
                  ))}
                  <text x={cx} y={cy-6} textAnchor="middle" fill="#64748b" fontSize="11">合計</text>
                  <text x={cx} y={cy+10} textAnchor="middle" fill="#0f172a" fontSize="13" fontWeight="bold">
                    {new Intl.NumberFormat('ja-JP',{notation:'compact'}).format(total)}円
                  </text>
                </svg>
                <div className="legend">
                  {byCat.map(cat=>(
                    <div className="legend-item" key={cat.value}>
                      <div className="legend-dot" style={{background:cat.color}}/>
                      <span className="legend-label">{cat.label}</span>
                      <span className="legend-pct">{cat.pct}%</span>
                      <span className="legend-amt">{fmt(cat.amount)}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
          <div className="table-wrap">
            <div className="table-header"><span>明細</span></div>
            {expenses.sort((a,b)=>new Date(a.expense_date)-new Date(b.expense_date)).map(e=>(
              <div className="table-row" key={e.id} style={{cursor:'default'}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13}}>{e.title}</div>
                  <div style={{fontSize:12,color:'#94a3b8'}}>{getCat(e.category)} · {e.expense_date}</div>
                </div>
                <span style={{fontSize:13,fontWeight:600}}>{fmt(e.amount)}</span>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ===== MAIN APP =====
function App(){
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [selectedId,setSelectedId]=useState(null);
  const [editId,setEditId]=useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);
      if(session?.user)loadProfile(session.user.id);
      else setAuthLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
      if(session?.user)loadProfile(session.user.id);
      else{setProfile(null);setAuthLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  async function loadProfile(uid){
    const {data}=await sb.from('profiles').select('*').eq('id',uid).single();
    setProfile(data);setAuthLoading(false);
  }

  async function logout(){
    await sb.auth.signOut();
    setPage('dashboard');setSelectedId(null);setEditId(null);
  }

  if(authLoading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#94a3b8'}}>読み込み中...</div>;
  if(!user||!profile)return<Login/>;

  const isApprover=['manager','office'].includes(profile.role);
  const navItems=[
    {key:'dashboard',icon:'🏠',label:'ダッシュボード'},
    {key:'expenses',icon:'📋',label:'経費一覧'},
    ...(isApprover?[{key:'approvals',icon:'✅',label:'承認待ち'}]:[]),
    {key:'reports',icon:'📊',label:'レポート'},
  ];

  function renderPage(){
    if(page==='detail'&&selectedId)return<ExpenseDetail profile={profile} expenseId={selectedId} onBack={()=>{setPage('expenses');setSelectedId(null)}} onEdit={id=>{setEditId(id);setPage('form')}}/>;
    if(page==='form')return<ExpenseForm profile={profile} expenseId={editId} onSave={()=>{setPage('expenses');setEditId(null)}} onCancel={()=>{setPage('expenses');setEditId(null)}}/>;
    if(page==='expenses')return<ExpenseList profile={profile} onSelect={id=>{setSelectedId(id);setPage('detail')}} onNew={()=>{setEditId(null);setPage('form')}}/>;
    if(page==='approvals')return<ApprovalPage profile={profile} onSelect={id=>{setSelectedId(id);setPage('detail')}}/>;
    if(page==='reports')return<ReportPage profile={profile}/>;
    return<Dashboard profile={profile}/>;
  }

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon">🧾</div>
          <div><div className="logo-text">うま味経費</div><div className="logo-sub">Expense Manager</div></div>
        </div>
        <nav>
          {navItems.map(n=>(
            <button key={n.key} className={`nav-item ${page===n.key?'active':''}`} onClick={()=>{setPage(n.key);setSelectedId(null);setEditId(null);}}>
              <span>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
        <div className="sidebar-user">
          <div className="user-info">
            <div className="user-avatar">{profile.name[0]}</div>
            <div>
              <div className="user-name">{profile.name}</div>
              <span className={`role-badge ${ROLE_BADGE[profile.role]||'role-staff'}`}>{ROLE_LABELS[profile.role]||profile.role}</span>
            </div>
          </div>
          <button className="logout-btn" onClick={logout}>🚪 ログアウト</button>
        </div>
      </aside>
      <main className="main">{renderPage()}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
