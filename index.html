<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うま味経費精算</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f8fafc;color:#0f172a}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.logo-text{font-weight:700;font-size:14px;color:#0f172a}
.logo-sub{font-size:11px;color:#94a3b8}
nav{flex:1;padding:10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#475569;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:#f1f5f9;color:#0f172a}
.nav-item.active{background:#eff6ff;color:#2563eb}
.sidebar-user{padding:14px 16px;border-top:1px solid #e2e8f0}
.user-info{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.user-avatar{width:32px;height:32px;background:#e2e8f0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#475569}
.user-name{font-size:13px;font-weight:600;color:#0f172a}
.role-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;margin-top:2px}
.role-staff{background:#dbeafe;color:#1d4ed8}
.role-manager{background:#ede9fe;color:#6d28d9}
.role-office{background:#dcfce7;color:#15803d}
.logout-btn{background:none;border:none;color:#94a3b8;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 0}
.logout-btn:hover{color:#0f172a}
.main{flex:1;overflow-y:auto;padding-bottom:80px}
.page{padding:20px;max-width:900px;margin:0 auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:700;color:#0f172a}
.page-sub{font-size:13px;color:#64748b;margin-top:2px}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#fff;color:#374151;border:1px solid #e2e8f0}
.btn-secondary:hover{background:#f8fafc}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-success{background:#16a34a;color:#fff}
.btn-success:hover{background:#15803d}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.stat-value{font-size:24px;font-weight:700;color:#0f172a}
.stat-label{font-size:12px;color:#64748b;margin-top:2px}
.table-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden}
.table-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:#f8fafc}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge-draft{background:#f1f5f9;color:#475569}
.badge-pending{background:#fef9c3;color:#854d0e}
.badge-approved{background:#dcfce7;color:#15803d}
.badge-rejected{background:#fee2e2;color:#991b1b}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px}
.required{color:#dc2626;margin-left:2px}
.form-input{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:14px;color:#0f172a;outline:none;transition:border .15s}
.form-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-input.error{border-color:#dc2626}
.err-text{color:#dc2626;font-size:12px;margin-top:3px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.login-wrap{min-height:100vh;background:linear-gradient(135deg,#1e3a8a,#2563eb,#3b82f6);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo-icon{width:56px;height:56px;background:#2563eb;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px}
.login-title{font-size:22px;font-weight:700;color:#0f172a}
.login-sub{font-size:13px;color:#64748b;margin-top:4px}
.error-msg{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
.approval-flow{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:12px 16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;flex-wrap:wrap}
.flow-step{text-align:center;font-size:12px}
.flow-step-name{font-weight:600;color:#0f172a}
.flow-arrow{color:#94a3b8;font-size:16px}
.flow-step.active .flow-step-name{color:#2563eb}
.flow-step.done .flow-step-name{color:#16a34a}
.log-item{display:flex;gap:12px;margin-bottom:14px}
.log-avatar{width:30px;height:30px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#475569;flex-shrink:0}
.log-content{flex:1}
.log-meta{font-size:12px;color:#64748b}
.log-comment{font-size:13px;color:#374151;margin-top:3px}
.action-approve{color:#16a34a;font-weight:600}
.action-reject{color:#dc2626;font-weight:600}
.action-submit{color:#2563eb;font-weight:600}
.empty{padding:40px;text-align:center;color:#94a3b8;font-size:14px}
.receipt-preview{max-width:100%;border-radius:8px;border:1px solid #e2e8f0;margin-top:8px}
.upload-area{border:2px dashed #e2e8f0;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .15s}
.upload-area:hover{border-color:#2563eb;background:#eff6ff}
.upload-icon{font-size:28px;margin-bottom:6px}
.upload-text{font-size:13px;color:#64748b}
.donut-wrap{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.legend{flex:1;min-width:160px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{flex:1;color:#374151}
.legend-pct{color:#64748b;font-size:12px}
.legend-amt{font-weight:600;color:#0f172a;text-align:right;min-width:70px}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{position:relative;flex:2;min-width:140px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px}
.search-input{padding-left:32px!important}
.bulk-item{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:14px}
.bulk-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.bulk-item-num{font-size:13px;font-weight:700;color:#2563eb}
.bulk-img{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-bottom:12px;border:1px solid #e2e8f0}
.mobile-header{display:none;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:50}
.mobile-header-title{font-size:16px;font-weight:700;color:#0f172a}
.hamburger{background:none;border:none;font-size:22px;cursor:pointer;padding:4px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100}
.sidebar-overlay.open{display:block}
.sidebar-drawer{position:fixed;left:0;top:0;height:100vh;width:260px;background:#fff;z-index:101;transform:translateX(-100%);transition:transform .25s;display:flex;flex-direction:column}
.sidebar-drawer.open{transform:translateX(0)}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;padding:8px 0;z-index:50}
.bottom-nav-items{display:flex;justify-content:space-around}
.bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;border:none;background:none;cursor:pointer;min-width:60px}
.bottom-nav-item span:first-child{font-size:22px}
.bottom-nav-item span:last-child{font-size:10px;color:#94a3b8;font-weight:500}
.bottom-nav-item.active span:last-child{color:#2563eb}
.fab{display:none;position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:#2563eb;color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.4);z-index:50;align-items:center;justify-content:center}
@media(max-width:768px){
  .sidebar{display:none}
  .mobile-header{display:flex}
  .bottom-nav{display:block}
  .stats{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  .fab{display:flex}
  .page{padding:16px;padding-bottom:100px}
  .page-header .btn-primary{display:none}
  .page-header .btn-secondary{display:none}
}
@media(min-width:769px){
  .mobile-header{display:none}
  .bottom-nav{display:none}
  .fab{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://vossmbvgdixgfgnkzcdl.supabase.co';
const SUPABASE_KEY='sb_publishable_4IKc7bIsEwvbVSNdbPK9Jw_nI2MzKd2';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const CATEGORIES=[{value:'entertainment',label:'交際費'},{value:'transport',label:'交通費'},{value:'accommodation',label:'宿泊費'},{value:'other',label:'その他'}];
const STATUS={draft:{label:'下書き',badge:'badge-draft'},pending_manager:{label:'承認待ち(MG)',badge:'badge-pending'},pending_office:{label:'承認待ち(事務)',badge:'badge-pending'},approved:{label:'承認済み',badge:'badge-approved'},rejected:{label:'却下',badge:'badge-rejected'}};
const ROLE_LABELS={staff:'現場',manager:'マネージャー',office:'事務所'};
const ROLE_BADGE={staff:'role-staff',manager:'role-manager',office:'role-office'};
const CAT_COLORS=['#ec4899','#3b82f6','#8b5cf6','#f59e0b'];
function fmt(n){return new Intl.NumberFormat('ja-JP',{style:'currency',currency:'JPY'}).format(n)}
function fmtDate(d){if(!d)return'---';return new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})}
function getCat(v){return CATEGORIES.find(c=>c.value===v)?.label||v}
function Badge({status}){const s=STATUS[status]||{label:status,badge:'badge-draft'};return<span className={`badge ${s.badge}`}>{s.label}</span>}

function Login(){
  const[email,setEmail]=useState('');const[pass,setPass]=useState('');const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  async function handle(e){e.preventDefault();setLoading(true);setErr('');const{error}=await sb.auth.signInWithPassword({email,password:pass});if(error){setErr('メールアドレスまたはパスワードが正しくありません');setLoading(false);}}
  return(<div className="login-wrap"><div className="login-card"><div className="login-logo"><div className="login-logo-icon">🧾</div><div className="login-title">うま味経費精算</div><div className="login-sub">Expense Manager</div></div><form onSubmit={handle}>{err&&<div className="error-msg">{err}</div>}<div className="form-group"><label className="form-label">メールアドレス</label><input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="example@company.com" required/></div><div className="form-group"><label className="form-label">パスワード</label><input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required/></div><button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'12px'}} disabled={loading}>{loading?'ログイン中...':'ログイン'}</button></form></div></div>);
}

function Dashboard({profile}){
  const[stats,setStats]=useState({total:0,pending:0,approved:0,rejected:0});const[recent,setRecent]=useState([]);const[loading,setLoading]=useState(true);
  useEffect(()=>{loadData()},[]);
  async function loadData(){let q=sb.from('expenses').select('*');if(profile.role==='staff')q=q.eq('user_id',profile.id);const{data}=await q.order('created_at',{ascending:false}).limit(5);setRecent(data||[]);let sq=sb.from('expenses').select('status');if(profile.role==='staff')sq=sq.eq('user_id',profile.id);const{data:all}=await sq;if(all)setStats({total:all.length,pending:all.filter(e=>e.status.startsWith('pending')).length,approved:all.filter(e=>e.status==='approved').length,rejected:all.filter(e=>e.status==='rejected').length});setLoading(false);}
  const cards=[{label:'総件数',value:stats.total,icon:'📋',bg:'#eff6ff'},{label:'承認待ち',value:stats.pending,icon:'⏳',bg:'#fefce8'},{label:'承認済み',value:stats.approved,icon:'✅',bg:'#f0fdf4'},{label:'却下',value:stats.rejected,icon:'❌',bg:'#fef2f2'}];
  return(<div className="page"><div className="page-header"><div><div className="page-title">ダッシュボード</div><div className="page-sub">こんにちは、{profile.name} さん</div></div></div><div className="stats">{cards.map(c=>(<div className="stat-card" key={c.label}><div className="stat-icon" style={{background:c.bg}}>{c.icon}</div><div className="stat-value">{loading?'—':c.value}</div><div className="stat-label">{c.label}</div></div>))}</div><div className="card"><div style={{padding:'14px 16px',borderBottom:'1px solid #f1f5f9',fontWeight:600,fontSize:14}}>最近の申請</div>{loading?<div className="empty">読み込み中...</div>:recent.length===0?<div className="empty">申請がありません</div>:recent.map(e=>(<div className="table-row" key={e.id}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{e.title}</div><div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{fmtDate(e.expense_date)}</div></div><div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:13,fontWeight:700}}>{fmt(e.amount)}</span><Badge status={e.status}/></div></div>))}</div></div>);
}

function ExpenseList({profile,onSelect,onNew,onBulk}){
  const[expenses,setExpenses]=useState([]);const[loading,setLoading]=useState(true);const[search,setSearch]=useState('');const[statusFilter,setStatusFilter]=useState('');const[personFilter,setPersonFilter]=useState('');const[monthFilter,setMonthFilter]=useState('');const[showExportMenu,setShowExportMenu]=useState(false);
  useEffect(()=>{loadData()},[]);
  async function loadData(){setLoading(true);let q=sb.from('expenses').select('*,profiles(name)');if(profile.role==='staff')q=q.eq('user_id',profile.id);const{data}=await q.order('created_at',{ascending:false});setExpenses(data||[]);setLoading(false);}
  const personList=[...new Set(expenses.map(e=>e.profiles?.name).filter(Boolean))];
  const monthList=[...new Set(expenses.map(e=>e.expense_date?.slice(0,7)).filter(Boolean))].sort().reverse();
  function getFiltered(){return expenses.filter(e=>{const ms=!search||e.title.toLowerCase().includes(search.toLowerCase());const mf=!statusFilter||e.status===statusFilter;const mp=!personFilter||e.profiles?.name===personFilter;const mm=!monthFilter||e.expense_date?.startsWith(monthFilter);return ms&&mf&&mp&&mm;});}
  function exportCSV(){const filtered=getFiltered();const rows=[['日付','適用','金額','備考','ステータス','申請者'],...filtered.map(e=>[e.expense_date,getCat(e.category)+' '+e.title,e.amount,e.description||'',STATUS[e.status]?.label||e.status,e.profiles?.name||''])];const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`expenses_${new Date().toISOString().slice(0,10)}.csv`;a.click();setShowExportMenu(false);}
  function exportPDF(){
    const filtered=getFiltered();
    const today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
    const total=filtered.reduce((s,e)=>s+e.amount,0);
    const byCat=CATEGORIES.map(cat=>({...cat,items:filtered.filter(e=>e.category===cat.value),subtotal:filtered.filter(e=>e.category===cat.value).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.items.length>0);
    const allReceipts=filtered.filter(e=>e.receipt_url);
    const receiptImgs=allReceipts.map(e=>`<div class="receipt-item"><img src="${e.receipt_url}" alt="領収書" crossorigin="anonymous"/><p>${e.expense_date} ${e.title}</p></div>`).join('');
    const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><style>body{font-family:'MS Gothic','Hiragino Sans',sans-serif;font-size:11px;margin:20px}h2{text-align:center;font-size:15px;margin-bottom:14px}.header-row{display:flex;justify-content:space-between;margin-bottom:10px}.total-box{border:2px solid #000;padding:4px 14px;font-size:13px;font-weight:bold}table{width:100%;border-collapse:collapse;margin-bottom:10px}th,td{border:1px solid #000;padding:4px 6px}th{background:#d9d9d9;text-align:center;font-weight:bold}.receipt-section{margin-top:20px;border-top:2px solid #000;padding-top:14px}.receipt-title{font-size:13px;font-weight:bold;margin-bottom:12px}.receipt-grid{display:flex;flex-wrap:wrap;gap:10px}.receipt-item{text-align:center}.receipt-item img{width:180px;height:140px;object-fit:cover;border:1px solid #000;display:block}.receipt-item p{font-size:9px;margin-top:3px;width:180px;word-break:break-all}@media print{body{margin:0}}</style></head><body><h2>UMAMI経費精算</h2><div class="header-row"><div>申請日：${today}</div><div class="total-box">合計 ¥${total.toLocaleString()}</div></div><div style="margin-bottom:10px">申請者：${profile.name}</div>${byCat.map(cat=>`<table><thead><tr><th style="width:90px">日付</th><th>適用</th><th style="width:80px">金額</th><th>備考</th></tr></thead><tbody><tr><td colspan="4" style="background:#f0f0f0;font-weight:bold">【${cat.label}】</td></tr>${cat.items.map(e=>`<tr><td>${e.expense_date}</td><td>${e.title}</td><td style="text-align:right">¥${e.amount.toLocaleString()}</td><td>${e.description||''}</td></tr>`).join('')}<tr><td colspan="2" style="font-weight:bold;text-align:right">小計</td><td style="font-weight:bold">¥${cat.subtotal.toLocaleString()}</td><td></td></tr></tbody></table>`).join('')}${allReceipts.length>0?`<div class="receipt-section"><div class="receipt-title">領収書一覧</div><div class="receipt-grid">${receiptImgs}</div></div>`:''}<script>window.onload=function(){window.print()}<\/script></body></html>`;
    const blob=new Blob([html],{type:'text/html;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    setShowExportMenu(false);
  }
  const filtered=getFiltered();

ontent"><div className="log-meta"><span style={{fontWeight:600,color:'#374151'}}>{l.profiles?.name}</span>{' · '}<span className={`action-${l.action}`}>{l.action==='approve'?'承認':l.action==='reject'?'却下':'申請'}</span></div>{l.comment&&<div className="log-comment">{l.comment}</div>}</div></div>))}</div>)}{(canApprove||canSubmit||canEdit||canDelete)&&(<div className="card" style={{padding:16}}>{canApprove&&(<><textarea className="form-input" rows={2} style={{resize:'none',marginBottom:10}} value={comment} onChange={e=>setComment(e.target.value)} placeholder="コメント（任意）"/><div style={{display:'flex',gap:10,marginBottom:10}}><button className="btn btn-danger" style={{flex:1,justifyContent:'center',padding:'12px'}} onClick={()=>doAction('reject')} disabled={loading}>❌ 却下</button><button className="btn btn-success" style={{flex:1,justifyContent:'center',padding:'12px'}} onClick={()=>doAction('approve')} disabled={loading}>✅ 承認</button></div></>)}{canSubmit&&<button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'12px',marginBottom:10}} onClick={()=>doAction('submit')} disabled={loading}>📤 申請する</button>}{canEdit&&(<div style={{display:'flex',gap:10,marginBottom:10}}><button className="btn btn-secondary" style={{flex:1,justifyContent:'center'}} onClick={()=>onEdit(expenseId)}>✏️ 編集</button><button className="btn btn-danger" style={{flex:1,justifyContent:'center'}} onClick={doDelete}>🗑 削除</button></div>)}{canDelete&&!canEdit&&(<button className="btn btn-danger" style={{width:'100%',justifyContent:'center',padding:'12px'}} onClick={doDelete}>🗑 この申請を削除</button>)}</div>)}</div>);

function ReportPage({profile}){
  const[month,setMonth]=useState(new Date().toISOString().slice(0,7));const[expenses,setExpenses]=useState([]);const[loading,setLoading]=useState(true);
  useEffect(()=>{loadData()},[month]);
  async function loadData(){setLoading(true);const start=month+'-01';const end=new Date(new Date(start).getFullYear(),new Date(start).getMonth()+1,0).toISOString().slice(0,10);let q=sb.from('expenses').select('*').gte('expense_date',start).lte('expense_date',end).eq('status','approved');if(profile.role==='staff')q=q.eq('user_id',profile.id);const{data}=await q;setExpenses(data||[]);setLoading(false);}
  const total=expenses.reduce((s,e)=>s+e.amount,0);
  const byCat=CATEGORIES.map((cat,i)=>{const amount=expenses.filter(e=>e.category===cat.value).reduce((s,e)=>s+e.amount,0);return{...cat,amount,color:CAT_COLORS[i%CAT_COLORS.length],pct:total?Math.round(amount/total*100):0};}).filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount);
  const months=Array.from({length:12},(_,i)=>{const d=new Date();d.setMonth(d.getMonth()-i);return{value:d.toISOString().slice(0,7),label:`${d.getFullYear()}年${d.getMonth()+1}月`};});
  const r=60,cx=80,cy=80,circ=2*Math.PI*r;let offset=0;
  const arcs=byCat.map(cat=>{const dash=(cat.pct/100)*circ;const el={cat,dash,offset};offset+=dash;return el;});
  return(<div className="page"><div className="page-header"><div className="page-title">月次レポート</div><select className="form-input" style={{width:140,fontSize:13}} value={month} onChange={e=>setMonth(e.target.value)}>{months.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}</select></div>{loading?<div className="empty">読み込み中...</div>:expenses.length===0?<div className="empty">この月の承認済み経費はありません</div>:(<><div className="card" style={{padding:16,marginBottom:12}}><div style={{fontSize:12,color:'#64748b',marginBottom:4}}>承認済み合計</div><div style={{fontSize:28,fontWeight:700}}>{fmt(total)}</div><div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>{expenses.length}件</div></div>{byCat.length>0&&(<div className="card" style={{padding:16,marginBottom:12}}><div style={{fontSize:13,fontWeight:600,marginBottom:14}}>カテゴリ別</div><div className="donut-wrap"><svg width="160" height="160">{arcs.map(({cat,dash,offset})=>(<circle key={cat.value} cx={cx} cy={cy} r={r} fill="none" stroke={cat.color} strokeWidth="20" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-offset}/>))}<text x={cx} y={cy-6} textAnchor="middle" fill="#64748b" fontSize="11">合計</text><text x={cx} y={cy+10} textAnchor="middle" fill="#0f172a" fontSize="13" fontWeight="bold">{new Intl.NumberFormat('ja-JP',{notation:'compact'}).format(total)}円</text></svg><div className="legend">{byCat.map(cat=>(<div className="legend-item" key={cat.value}><div className="legend-dot" style={{background:cat.color}}/><span className="legend-label">{cat.label}</span><span className="legend-pct">{cat.pct}%</span><span className="legend-amt">{fmt(cat.amount)}</span></div>))}</div></div></div>)}<div className="table-wrap">{expenses.sort((a,b)=>new Date(a.expense_date)-new Date(b.expense_date)).map(e=>(<div className="table-row" key={e.id} style={{cursor:'default'}}><div style={{flex:1}}><div style={{fontSize:13}}>{e.title}</div><div style={{fontSize:12,color:'#94a3b8'}}>{getCat(e.category)} · {e.expense_date}</div></div><span style={{fontSize:13,fontWeight:600}}>{fmt(e.amount)}</span></div>))}</div></>)}</div>);
}

function App(){
  const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);const[authLoading,setAuthLoading]=useState(true);const[page,setPage]=useState('dashboard');const[selectedId,setSelectedId]=useState(null);const[editId,setEditId]=useState(null);const[drawerOpen,setDrawerOpen]=useState(false);
  useEffect(()=>{sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user||null);if(session?.user)loadProfile(session.user.id);else setAuthLoading(false);});const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setUser(session?.user||null);if(session?.user)loadProfile(session.user.id);else{setProfile(null);setAuthLoading(false);}});return()=>subscription.unsubscribe();},[]);
  async function loadProfile(uid){const{data}=await sb.from('profiles').select('*').eq('id',uid).single();setProfile(data);setAuthLoading(false);}
  async function logout(){await sb.auth.signOut();setPage('dashboard');setSelectedId(null);setEditId(null);}
  function goPage(p){setPage(p);setSelectedId(null);setEditId(null);setDrawerOpen(false);}
  if(authLoading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#94a3b8'}}>読み込み中...</div>;
  if(!user||!profile)return<Login/>;
  const isApprover=['manager','office'].includes(profile.role);
  const navItems=[{key:'dashboard',icon:'🏠',label:'ホーム'},{key:'expenses',icon:'📋',label:'経費一覧'},...(isApprover?[{key:'approvals',icon:'✅',label:'承認'}]:[]),{key:'reports',icon:'📊',label:'レポート'}];
  const pageTitles={dashboard:'ダッシュボード',expenses:'経費一覧',approvals:'承認待ち',reports:'月次レポート',detail:'経費詳細',form:editId?'経費を編集':'経費を申請',bulk:'一括申請'};
  function renderPage(){
    if(page==='detail'&&selectedId)return<ExpenseDetail profile={profile} expenseId={selectedId} onBack={()=>{setPage('expenses');setSelectedId(null);}} onEdit={id=>{setEditId(id);setPage('form');}}/>;
    if(page==='form')return<ExpenseForm profile={profile} expenseId={editId} onSave={()=>{setPage('expenses');setEditId(null);}} onCancel={()=>{setPage('expenses');setEditId(null);}}/>;
    if(page==='bulk')return<BulkExpenseForm profile={profile} onSave={()=>setPage('expenses')} onCancel={()=>setPage('expenses')}/>;
    if(page==='expenses')return<ExpenseList profile={profile} onSelect={id=>{setSelectedId(id);setPage('detail');}} onNew={()=>{setEditId(null);setPage('form');}} onBulk={()=>setPage('bulk')}/>;
    if(page==='approvals')return<ApprovalPage profile={profile} onSelect={id=>{setSelectedId(id);setPage('detail');}}/>;
    if(page==='reports')return<ReportPage profile={profile}/>;
    return<Dashboard profile={profile}/>;
  }
  const SidebarContent=()=>(<><div className="sidebar-logo"><div className="logo-icon">🧾</div><div><div className="logo-text">うま味経費</div><div className="logo-sub">Expense Manager</div></div></div><nav>{navItems.map(n=>(<button key={n.key} className={`nav-item ${page===n.key?'active':''}`} onClick={()=>goPage(n.key)}><span>{n.icon}</span>{n.label}</button>))}</nav><div className="sidebar-user"><div className="user-info"><div className="user-avatar">{profile.name[0]}</div><div><div className="user-name">{profile.name}</div><span className={`role-badge ${ROLE_BADGE[profile.role]||'role-staff'}`}>{ROLE_LABELS[profile.role]||profile.role}</span></div></div><button className="logout-btn" onClick={logout}>🚪 ログアウト</button></div></>);
  return(<div className="app"><aside className="sidebar"><SidebarContent/></aside><div className={`sidebar-overlay ${drawerOpen?'open':''}`} onClick={()=>setDrawerOpen(false)}/><div className={`sidebar-drawer ${drawerOpen?'open':''}`}><SidebarContent/></div><div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><div className="mobile-header"><button className="hamburger" onClick={()=>setDrawerOpen(true)}>☰</button><span className="mobile-header-title">{pageTitles[page]||'うま味経費'}</span><div style={{width:32}}/></div><main className="main">{renderPage()}</main></div><nav className="bottom-nav"><div className="bottom-nav-items">{navItems.map(n=>(<button key={n.key} className={`bottom-nav-item ${page===n.key?'active':''}`} onClick={()=>goPage(n.key)}><span>{n.icon}</span><span>{n.label}</span></button>))}</div></nav>{profile.role==='staff'&&!['form','bulk'].includes(page)&&(<button className="fab" onClick={()=>setPage('bulk')}>📷</button>)}</div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
