<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うま味経費精算</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f8fafc;color:#0f172a}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.logo-text{font-weight:700;font-size:14px;color:#0f172a}
.logo-sub{font-size:11px;color:#94a3b8}
nav{flex:1;padding:10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#475569;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:#f1f5f9;color:#0f172a}
.nav-item.active{background:#eff6ff;color:#2563eb}
.sidebar-user{padding:14px 16px;border-top:1px solid #e2e8f0}
.user-info{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.user-avatar{width:32px;height:32px;background:#e2e8f0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#475569}
.user-name{font-size:13px;font-weight:600;color:#0f172a}
.role-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;margin-top:2px}
.role-staff{background:#dbeafe;color:#1d4ed8}
.role-manager{background:#ede9fe;color:#6d28d9}
.role-office{background:#dcfce7;color:#15803d}
.logout-btn{background:none;border:none;color:#94a3b8;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 0}
.logout-btn:hover{color:#0f172a}
.main{flex:1;overflow-y:auto}
.page{padding:28px;max-width:900px;margin:0 auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:20px;font-weight:700;color:#0f172a}
.page-sub{font-size:13px;color:#64748b;margin-top:2px}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#fff;color:#374151;border:1px solid #e2e8f0}
.btn-secondary:hover{background:#f8fafc}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-success{background:#16a34a;color:#fff}
.btn-success:hover{background:#15803d}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.stat-value{font-size:26px;font-weight:700;color:#0f172a}
.stat-label{font-size:12px;color:#64748b;margin-top:2px}
.table-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden}
.table-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:#f8fafc}
.table-header{display:flex;align-items:center;padding:10px 18px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge-draft{background:#f1f5f9;color:#475569}
.badge-pending{background:#fef9c3;color:#854d0e}
.badge-approved{background:#dcfce7;color:#15803d}
.badge-rejected{background:#fee2e2;color:#991b1b}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.form-input{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;color:#0f172a;outline:none;transition:border .15s}
.form-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.login-wrap{min-height:100vh;background:linear-gradient(135deg,#1e3a8a,#2563eb,#3b82f6);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{width:56px;height:56px;background:#2563eb;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px}
.login-title{font-size:22px;font-weight:700;color:#0f172a}
.login-sub{font-size:13px;color:#64748b;margin-top:4px}
.error-msg{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
.approval-flow{display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:14px 18px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0}
.flow-step{text-align:center;font-size:12px}
.flow-step-name{font-weight:600;color:#0f172a}
.flow-arrow{color:#94a3b8;font-size:18px}
.flow-step.active .flow-step-name{color:#2563eb}
.flow-step.done .flow-step-name{color:#16a34a}
.log-item{display:flex;gap:12px;margin-bottom:14px}
.log-avatar{width:30px;height:30px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#475569;flex-shrink:0}
.log-content{flex:1}
.log-meta{font-size:12px;color:#64748b}
.log-comment{font-size:13px;color:#374151;margin-top:3px}
.action-approve{color:#16a34a;font-weight:600}
.action-reject{color:#dc2626;font-weight:600}
.action-submit{color:#2563eb;font-weight:600}
.empty{padding:50px;text-align:center;color:#94a3b8;font-size:14px}
.receipt-preview{max-width:280px;border-radius:8px;border:1px solid #e2e8f0;margin-top:8px}
.upload-area{border:2px dashed #e2e8f0;border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:all .15s}
.upload-area:hover{border-color:#2563eb;background:#eff6ff}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:13px;color:#64748b}
.donut-wrap{display:flex;gap:24px;align-items:center}
.legend{flex:1}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{flex:1;color:#374151}
.legend-pct{color:#64748b;font-size:12px}
.legend-amt{font-weight:600;color:#0f172a;text-align:right;min-width:80px}
.filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:2;min-width:180px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px}
.search-input{padding-left:32px!important}
@media(max-width:700px){.sidebar{display:none}.stats{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const SUPABASE_URL='https://vossmbvgdixgfgnkzcdl.supabase.co';
const SUPABASE_KEY='sb_publishable_4IKc7bIsEwvbVSNdbPK9Jw_nI2MzKd2';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const CATEGORIES=[{value:'transport',label:'交通費'},{value:'meal',label:'食費・接待費'},{value:'accommodation',label:'宿泊費'},{value:'supplies',label:'備品・消耗品'},{value:'communication',label:'通信費'},{value:'other',label:'その他'}];
const STATUS={draft:{label:'下書き',badge:'badge-draft'},pending_manager:{label:'マネージャー承認待ち',badge:'badge-pending'},pending_office:{label:'事務所承認待ち',badge:'badge-pending'},approved:{label:'承認済み',badge:'badge-approved'},rejected:{label:'却下',badge:'badge-rejected'}};
const ROLE_LABELS={staff:'現場',manager:'マネージャー',office:'事務所'};
const ROLE_BADGE={staff:'role-staff',manager:'role-manager',office:'role-office'};
const CAT_COLORS=['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#6366f1'];
function fmt(n){return new Intl.NumberFormat('ja-JP',{style:'currency',currency:'JPY'}).format(n)}
function fmtDate(d){if(!d)return'---';return new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})}
function getCat(v){return CATEGORIES.find(c=>c.value===v)?.label||v}
function Badge({status}){const s=STATUS[status]||{label:status,badge:'badge-draft'};return<span className={`badge ${s.badge}`}>{s.label}</span>}

function Login(){
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  async function handle(e){
    e.preventDefault();setLoading(true);setErr('');
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){setErr('メールアドレスまたはパスワードが正しくありません');setLoading(false);}
  }
  return(
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-icon">🧾</div>
          <div className="login-title">うま味経費精算</div>
          <div className="login-sub">Expense Manager</div>
        </div>
        <form onSubmit={handle}>
          {err&&<div className="error-msg">{err}</div>}
          <div className="form-group"><label className="form-label">メールアドレス</label><input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="example@company.com" required/></div>
          <div className="form-group"><label className="form-label">パスワード</label><input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" required/></div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px'}} disabled={loading}>{loading?'ログイン中...':'ログイン'}</button>
        </form>
      </div>
    </div>
  );
}

function Dashboard({profile}){
  const[stats,setStats]=useState({total:0,pending:0,approved:0,rejected:0});
  const[recent,setRecent]=useState([]);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{loadData()},[]);
  async function loadData(){
    let q=sb.from('expenses').select('*');
    if(profile.role==='staff')q=q.eq('user_id',profile.id);
    const{data}=await q.order('created_at',{ascending:false}).limit(5);
    setRecent(data||[]);
    let sq=sb.from('expenses').select('status');
    if(profile.role==='staff')sq=sq.eq('user_id',profile.id);
    const{data:all}=await sq;
    if(all)setStats({total:all.length,pending:all.filter(e=>e.status.startsWith('pending')).length,approved:all.filter(e=>e.status==='approved').length,rejected:all.filter(e=>e.status==='rejected').length});
    setLoading(false);
  }
  const cards=[{label:'総件数',value:stats.total,icon:'📋',bg:'#eff6ff'},{label:'承認待ち',value:stats.pending,icon:'⏳',bg:'#fefce8'},{label:'承認済み',value:stats.approved,icon:'✅',bg:'#f0fdf4'},{label:'却下',value:stats.rejected,icon:'❌',bg:'#fef2f2'}];
  return(
    <div className="page">
      <div className="page-header"><div><div className="page-title">ダッシュボード</div><div className="page-sub">こんにちは、{profile.name} さん</div></div></div>
      <div className="stats">{cards.map(c=>(<div className="stat-card" key={c.label}><div className="stat-icon" style={{background:c.bg}}>{c.icon}</div><div className="stat-value">{loading?'—':c.value}</div><div className="stat-label">{c.label}</div></div>))}</div>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',borderBottom:'1px solid #f1f5f9'}}><span style={{fontWeight:600,fontSize:14}}>最近の申請</span></div>
        {loading?<div className="empty">読み込み中...</div>:recent.length===0?<div className="empty">申請がありません</div>:recent.map(e=>(<div className="table-row" key={e.id}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{e.title}</div><div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{fmtDate(e.expense_date)}</div></div><div style={{display:'flex',alignItems:'center',gap:12}}><span style={{fontSize:13,fontWeight:700}}>{fmt(e.amount)}</span><Badge status={e.status}/></div></div>))}
      </div>
    </div>
  );
}

function ExpenseList({profile,onSelect,onNew}){
  const[expenses,setExpenses]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState('');
  const[statusFilter,setStatusFilter]=useState('');
  const[personFilter,setPersonFilter]=useState('');
  const[monthFilter,setMonthFilter]=useState('');
  const[showExportMenu,setShowExportMenu]=useState(false);
  useEffect(()=>{loadData()},[]);
  async function loadData(){
    setLoading(true);
    let q=sb.from('expenses').select('*,profiles(name)');
    if(profile.role==='staff')q=q.eq('user_id',profile.id);
    const{data}=await q.order('created_at',{ascending:false});
    setExpenses(data||[]);setLoading(false);
  }
  const personList=[...new Set(expenses.map(e=>e.profiles?.name).filter(Boolean))];
  const monthList=[...new Set(expenses.map(e=>e.expense_date?.slice(0,7)).filter(Boolean))].sort().reverse();
  function getFiltered(){
    return expenses.filter(e=>{
      const ms=!search||e.title.toLowerCase().includes(search.toLowerCase());
      const mf=!statusFilter||e.status===statusFilter;
      const mp=!personFilter||e.profiles?.name===personFilter;
      const mm=!monthFilter||e.expense_date?.startsWith(monthFilter);
      return ms&&mf&&mp&&mm;
    });
  }
  function exportCSV(){
    const filtered=getFiltered();
    const rows=[['タイトル','金額','カテゴリ','日付','ステータス','申請者'],...filtered.map(e=>[e.title,e.amount,getCat(e.category),e.expense_date,STATUS[e.status]?.label||e.status,e.profiles?.name||''])];
    const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`expenses_${new Date().toISOString().slice(0,10)}.csv`;a.click();
    setShowExportMenu(false);
  }
  function exportPDF(){
    const filtered=getFiltered();
    const today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
    const byCategory={transport:filtered.filter(e=>e.category==='transport'),accommodation:filtered.filter(e=>e.category==='accommodation'),meal:filtered.filter(e=>e.category==='meal'),other:filtered.filter(e=>['supplies','communication','other'].includes(e.category))};
    const catLabels={transport:'交通費',accommodation:'宿泊費',meal:'食費・接待費',other:'その他'};
    const total=filtered.reduce((s,e)=>s+e.amount,0);
    function makeRows(items,max=5){const rows=[];for(let i=0;i<max;i++){const e=items[i];rows.push(`<tr><td>${e?e.expense_date:''}</td><td style="text-align:right">${e?'¥'+e.amount.toLocaleString():''}</td><td>${e?e.title:''}</td></tr>`);}return rows.join('');}
    function catTotal(items){return items.reduce((s,e)=>s+e.amount,0);}
    const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><style>body{font-family:'MS Gothic','Hiragino Sans',sans-serif;font-size:12px;margin:20px}h2{text-align:center;font-size:16px;margin-bottom:16px}.header-row{display:flex;justify-content:space-between;margin-bottom:12px}.total-box{border:2px solid #000;padding:4px 16px;font-size:14px;font-weight:bold}table{width:100%;border-collapse:collapse;margin-bottom:12px}th,td{border:1px solid #000;padding:4px 8px}th{background:#d9d9d9;text-align:center}.subtotal{text-align:right;font-weight:bold}@media print{body{margin:0}}</style></head><body><h2>UMAMI経費精算</h2><div class="header-row"><div>申請日：${today}</div><div class="total-box">合計 ¥${total.toLocaleString()}</div></div><div style="margin-bottom:12px">申請者：${profile.name}</div>${Object.entries(byCategory).map(([key,items],idx)=>`<table><thead><tr><th style="width:120px">日付</th><th style="width:100px">①${idx+1}${catLabels[key]}</th><th>内容</th></tr></thead><tbody>${makeRows(items)}<tr><td colspan="2" class="subtotal">小計 ¥${catTotal(items).toLocaleString()}</td><td></td></tr></tbody></table>`).join('')}<script>window.onload=function(){window.print()}<\/script></body></html>`;
    const blob=new Blob([html],{type:'text/html;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    window.open(url,'_blank');
    setShowExportMenu(false);
  }
  const filtered=getFiltered();
  return(
    <div className="page">
      <div className="page-header">
        <div className="page-title">経費一覧</div>
        <div style={{display:'flex',gap:8}}>
          <div style={{position:'relative'}}>
            <button className="btn btn-secondary" onClick={()=>setShowExportMenu(!showExportMenu)}>📥 出力 ▾</button>
            {showExportMenu&&(<div style={{position:'absolute',right:0,top:'110%',background:'#fff',border:'1px solid #e2e8f0',borderRadius:8,boxShadow:'0 4px 12px rgba(0,0,0,.1)',zIndex:100,minWidth:140}}>
              <button onClick={exportCSV} style={{display:'block',width:'100%',padding:'10px 16px',border:'none',background:'none',textAlign:'left',cursor:'pointer',fontSize:13,borderBottom:'1px solid #f1f5f9'}}>📊 Excel（CSV）</button>
              <button onClick={exportPDF} style={{display:'block',width:'100%',padding:'10px 16px',border:'none',background:'none',textAlign:'left',cursor:'pointer',fontSize:13}}>📄 PDF（ひな形）</button>
            </div>)}
          </div>
          {profile.role==='staff'&&<button className="btn btn-primary" onClick={onNew}>＋ 申請</button>}
        </div>
      </div>
      <div className="filter-row">
        <div className="search-wrap"><span className="search-icon">🔍</span><input className="form-input search-input" placeholder="タイトルで検索..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <select className="form-input" style={{width:150}} value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}><option value="">全ステータス</option>{Object.entries(STATUS).map(([v,s])=><option key={v} value={v}>{s.label}</option>)}</select>
        {profile.role!=='staff'&&(<select className="form-input" style={{width:130}} value={personFilter} onChange={e=>setPersonFilter(e.target.value)}><option value="">全申請者</option>{personList.map(n=><option key={n} value={n}>{n}</option>)}</select>)}
        <select className="form-input" style={{width:120}} value={monthFilter} onChange={e=>setMonthFilter(e.target.value)}><option value="">全月</option>{monthList.map(m=><option key={m} value={m}>{m.replace('-','年')}月</option>)}</select>
      </div>
      <div className="table-wrap">
        {loading?<div className="empty">読み込み中...</div>:filtered.length===0?<div className="empty">申請がありません</div>:filtered.map(e=>(<div className="table-row" key={e.id} onClick={()=>onSelect(e.id)}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{e.title}</div><div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{getCat(e.category)} · {fmtDate(e.expense_date)}{profile.role!=='staff'&&e.profiles?.name&&` · ${e.profiles.name}`}</div></div><div style={{display:'flex',alignItems:'center',gap:12}}><span style={{fontSize:13,fontWeight:700}}>{fmt(e.amount)}</span><Badge status={e.status}/><span style={{color:'#cbd5e1'}}>›</span></div></div>))}
      </div>
    </div>
  );
}

function ExpenseForm({profile,expenseId,onSave,onCancel}){
  const[form,setForm]=useState({title:'',amount:'',category:'transport',expense_date:new Date().toISOString().slice(0,10),description:'',receipt_url:''});
  const[file,setFile]=useState(null);
  const[preview,setPreview]=useState('');
  const[loading,setLoading]=useState(false);
  const isEdit=!!expenseId;
  useEffect(()=>{if(isEdit)loadExpense()},[expenseId]);
  async function loadExpense(){const{data}=await sb.from('expenses').select('*').eq('id',expenseId).single();if(data){setForm({title:data.title,amount:data.amount,category:data.category,expense_date:data.expense_date,description:data.description||'',receipt_url:data.receipt_url||''});if(data.receipt_url)setPreview(data.receipt_url);}}
