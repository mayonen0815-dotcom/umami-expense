function fetchImageAsDataURL(url,timeoutMs=8000){
  return new Promise(resolve=>{
    const controller=new AbortController();
    const timer=setTimeout(()=>{controller.abort();resolve(null);},timeoutMs);
    fetch(url,{signal:controller.signal}).then(res=>{
      if(!res.ok)throw new Error('fetch failed');
      return res.blob();
    }).then(blob=>{
      const reader=new FileReader();
      reader.onload=()=>{clearTimeout(timer);resolve(reader.result);};
      reader.onerror=()=>{clearTimeout(timer);resolve(null);};
      reader.readAsDataURL(blob);
    }).catch(()=>{clearTimeout(timer);resolve(null);});
  });
}

function resizeImageDataURL(dataUrl,maxDim=700,quality=0.55,timeoutMs=6000){
  return new Promise(resolve=>{
    let done=false;
    const finish=v=>{if(!done){done=true;resolve(v);}};
    const timer=setTimeout(()=>finish(null),timeoutMs);
    const img=new Image();
    img.onload=()=>{
      try{
        clearTimeout(timer);
        let w=img.naturalWidth||img.width,h=img.naturalHeight||img.height;
        if(!w||!h){finish(dataUrl);return;}
        if(w>maxDim||h>maxDim){
          const scale=maxDim/Math.max(w,h);
          w=Math.max(1,Math.round(w*scale));
          h=Math.max(1,Math.round(h*scale));
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        finish(canvas.toDataURL('image/jpeg',quality));
      }catch(e){finish(null);}
    };
    img.onerror=()=>{clearTimeout(timer);finish(null);};
    img.src=dataUrl;
  });
}

  try{
    const opt={margin:8,filename:'batch.pdf',image:{type:'jpeg',quality:0.85},html2canvas:{scale:1.3,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}};
    const pdfPromise=html2pdf().set(opt).from(container).outputPdf('blob');
    const timeoutPromise=new Promise((_,reject)=>setTimeout(()=>reject(new Error('PDF生成がタイムアウトしました')),25000));
    const blob=await Promise.race([pdfPromise,timeoutPromise]);
    document.body.removeChild(container);
    const path=`batches/${actorId}/${Date.now()}.pdf`;
    const{error:upErr}=await sb.storage.from('receipts').upload(path,blob,{contentType:'application/pdf'});
    if(upErr)throw upErr;
    const{data:{publicUrl}}=sb.storage.from('receipts').getPublicUrl(path);
    return publicUrl;
  }catch(e){
    if(container.parentNode)document.body.removeChild(container);
    throw e;
  }
}

function ExpenseList({profile,company,onSelect,onNew,onBulk}){
  const[expenses,setExpenses]=useState([]);const[loading,setLoading]=useState(true);const[search,setSearch]=useState('');const[statusFilter,setStatusFilter]=useState('');const[personFilter,setPersonFilter]=useState('');const[monthFilter,setMonthFilter]=useState('');const[companyFilter,setCompanyFilter]=useState(company||'');const[bundlingKey,setBundlingKey]=useState(null);const[mode,setMode]=useState('none');const[selected,setSelected]=useState({});const[busy,setBusy]=useState(false);
  useEffect(()=>{loadData()},[]);
  async function loadData(){setLoading(true);let q=sb.from('expenses').select('*,profiles(name)');if(profile.role==='staff')q=q.eq('user_id',profile.id);if(company)q=q.eq('company',company);const{data}=await q.order('created_at',{ascending:false});setExpenses(data||[]);setSelected({});setLoading(false);}
  const personList=[...new Set(expenses.map(e=>e.profiles?.name).filter(Boolean))];
  const monthList=[...new Set(expenses.map(e=>e.expense_date?.slice(0,7)).filter(Boolean))].sort().reverse();
  function getFiltered(){return expenses.filter(e=>{const ms=!search||e.title.toLowerCase().includes(search.toLowerCase())||e.profiles?.name?.toLowerCase().includes(search.toLowerCase());const mf=!statusFilter||e.status===statusFilter;const mp=!personFilter||e.profiles?.name===personFilter;const mm=!monthFilter||e.expense_date?.startsWith(monthFilter);const mc=!companyFilter||e.company===companyFilter;return ms&&mf&&mp&&mm&&mc;});}
  const filtered=getFiltered();
  const isOffice=profile.role==='office';
  const isStaff=profile.role==='staff';
  const submittableStatuses=['draft','rejected','pending_office'];
  const deletableStatuses=isOffice?Object.keys(STATUS):['draft','rejected'];
  const eligibleStatuses=mode==='delete'?deletableStatuses:mode==='submit'?submittableStatuses:[];
  const showGrouping=mode==='none'&&(!statusFilter||statusFilter==='pending_office');
  const pendingItems=showGrouping?filtered.filter(e=>e.status==='pending_office'):[];
  const otherItems=filtered.filter(e=>!(showGrouping&&e.status==='pending_office'));
  const groups={};
  pendingItems.forEach(e=>{const day=(e.created_at||e.expense_date||'').slice(0,10);const key=`${e.company||'—'}__${day}`;(groups[key]=groups[key]||{company:e.company,day,items:[]}).items.push(e);});
  function toggleSelect(id){setSelected(s=>({...s,[id]:!s[id]}));}
  const selectedIds=Object.keys(selected).filter(id=>selected[id]);
  function switchMode(next){setMode(m=>m===next?'none':next);setSelected({});}
  async function handleSubmitSelected(){
    const items=filtered.filter(e=>selectedIds.includes(e.id));
    if(items.length===0)return;
    setBusy(true);
    try{
      const pdf_url=await generateAndUploadBatchPDF(items,profile.id);
      const{data:batch,error:bErr}=await sb.from('pdf_batches').insert({company:items[0].company,created_by:profile.id,pdf_url,status:'processing'}).select().single();
      if(bErr)throw bErr;
      const ids=items.map(e=>e.id);
      await sb.from('expenses').update({status:'processing',batch_id:batch.id}).in('id',ids);
      await sb.from('approval_logs').insert(items.map(e=>({expense_id:e.id,actor_id:profile.id,action:'process',comment:`${items.length}件を経費提出`,from_status:e.status,to_status:'processing'})));
      setMode('none');
      await loadData();
    }catch(e){alert('経費提出に失敗しました: '+e.message);}
    setBusy(false);
  }
  async function handleConfirmDelete(){
    if(selectedIds.length===0)return;
    if(!confirm(`選択した${selectedIds.length}件を削除しますか？（元に戻せません）`))return;
    setBusy(true);
    try{
      await sb.from('expenses').delete().in('id',selectedIds);
      setMode('none');
      await loadData();
    }catch(e){alert('削除に失敗しました: '+e.message);}
    setBusy(false);
  }
  async function handleBundleGroup(items){
    setBundlingKey(items[0].id);
    try{
      const pdf_url=await generateAndUploadBatchPDF(items,profile.id);
      const{data:batch,error:bErr}=await sb.from('pdf_batches').insert({company:items[0].company,created_by:profile.id,pdf_url,status:'processing'}).select().single();
      if(bErr)throw bErr;
      const ids=items.map(e=>e.id);
      await sb.from('expenses').update({status:'processing',batch_id:batch.id}).in('id',ids);
      await sb.from('approval_logs').insert(items.map(e=>({expense_id:e.id,actor_id:profile.id,action:'process',comment:`${items.length}件まとめPDF（同日申請）`,from_status:'pending_office',to_status:'processing'})));
      await loadData();
    }catch(e){alert('まとめPDFの作成に失敗しました: '+e.message);}
    setBundlingKey(null);
  }
  return(<div className="page"><div className="page-header"><div className="page-title">経費一覧</div><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{isStaff&&<button className={mode==='submit'?'btn btn-primary':'btn btn-secondary'} onClick={()=>switchMode('submit')}>✅ 経費申請</button>}<button className={mode==='delete'?'btn btn-danger':'btn btn-secondary'} onClick={()=>switchMode('delete')}>🗑 経費削除</button>{isStaff&&<button className="btn btn-secondary" onClick={onBulk}>📷 一括申請</button>}{isStaff&&<button className="btn btn-primary" onClick={onNew}>＋ 申請</button>}</div></div>
    {mode==='submit'&&(<div className="select-bar"><span className="select-bar-text">{selectedIds.length}件選択中（下書き・承認待ち・却下が選択できます）</span><button className="btn btn-primary btn-sm" onClick={handleSubmitSelected} disabled={busy||selectedIds.length===0}>{busy?'送信中...':'📤 経費提出'}</button></div>)}
    {mode==='delete'&&(<div className="select-bar" style={{background:'#fee2e2',borderColor:'#fecaca'}}><span className="select-bar-text" style={{color:'#991b1b'}}>{selectedIds.length}件選択中{isStaff?'（下書き・却下のみ）':''}</span><button className="btn btn-danger btn-sm" onClick={handleConfirmDelete} disabled={busy||selectedIds.length===0}>{busy?'削除中...':'🗑 確定'}</button></div>)}
    <div className="filter-row">
      <div className="search-wrap"><span className="search-icon">🔍</span><input className="form-input search-input" placeholder="検索..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
      <select className="form-input" style={{width:110,fontSize:13}} value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}><option value="">全ステータス</option>{Object.entries(STATUS).map(([v,s])=><option key={v} value={v}>{s.label}</option>)}</select>
      {profile.role!=='staff'&&(<select className="form-input" style={{width:100,fontSize:13}} value={personFilter} onChange={e=>setPersonFilter(e.target.value)}><option value="">全申請者</option>{personList.map(n=><option key={n} value={n}>{n}</option>)}</select>)}
      <select className="form-input" style={{width:95,fontSize:13}} value={monthFilter} onChange={e=>setMonthFilter(e.target.value)}><option value="">全月</option>{monthList.map(m=><option key={m} value={m}>{m.replace('-','年')}月</option>)}</select>
      {!company&&(<select className="form-input" style={{width:110,fontSize:13}} value={companyFilter} onChange={e=>setCompanyFilter(e.target.value)}><option value="">全法人</option>{COMPANIES.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}</select>)}
    </div>
    {loading?<div className="table-wrap"><div className="empty">読み込み中...</div></div>:(<>
      {showGrouping&&Object.keys(groups).length>0&&(<>
        <div style={{fontSize:13,fontWeight:600,color:'#854d0e',marginBottom:8}}>⏳ 承認待ち（同日申請はまとめて表示されます）</div>
        {Object.entries(groups).map(([key,group])=>{
          const total=group.items.reduce((s,e)=>s+e.amount,0);
          const isBundling=bundlingKey===group.items[0].id;
          return(<div className="batch-card" key={key}>
            <div className="batch-card-header">
              <span className="batch-card-title">{group.company?.replace('株式会社','')||'—'} ／ {fmtDate(group.day)}申請（{group.items.length}件・{fmt(total)}）</span>
              {isOffice&&<button className="btn btn-warning btn-sm" onClick={()=>handleBundleGroup(group.items)} disabled={isBundling}>{isBundling?'PDF作成中...':group.items.length>1?'📄 まとめて承認中へ':'📄 承認中へ'}</button>}
            </div>
            <div className="batch-card-body">{group.items.map(e=>(<div className="expense-row" key={e.id} style={{cursor:'pointer'}} onClick={()=>onSelect(e.id)}><span className="expense-name">{e.profiles?.name||''}</span><span className="expense-title">{e.title}</span><span className="expense-amount">{fmt(e.amount)}</span></div>))}</div>
          </div>);
        })}
      </>)}
      <div className="table-wrap">
        {otherItems.length===0?(showGrouping&&Object.keys(groups).length>0?null:<div className="empty">申請がありません</div>):otherItems.map(e=>{
          const canPick=mode!=='none'&&eligibleStatuses.includes(e.status);
          return(<div className="expense-row" key={e.id} style={{cursor:canPick?'default':'pointer'}} onClick={canPick?undefined:()=>onSelect(e.id)}>
            {mode!=='none'&&(canPick?<input type="checkbox" className="checkbox" checked={!!selected[e.id]} onChange={()=>toggleSelect(e.id)}/>:<span style={{width:16,display:'inline-block'}}/>)}
            <span className="expense-company">{e.company?.replace('株式会社','')||'—'}</span>
            <span className="expense-name">{e.profiles?.name||''}</span>
            <span className="expense-title" style={{cursor:'pointer'}} onClick={()=>onSelect(e.id)}>{e.title}</span>
            <span className="expense-amount">{fmt(e.amount)}</span>
            <Badge status={e.status}/>
            <button className="btn btn-secondary btn-sm" style={{flexShrink:0}} onClick={ev=>{ev.stopPropagation();generatePDF(e);}}>📄 PDF</button>
          </div>);
        })}
      </div>
    </>)}
  </div>);
}

function ExpenseForm({profile,company,expenseId,onSave,onCancel}){
  const[form,setForm]=useState({title:'',amount:'',category:'entertainment',expense_date:new Date().toISOString().slice(0,10),description:'',receipt_url:''});const[file,setFile]=useState(null);const[preview,setPreview]=useState('');const[loading,setLoading]=useState(false);const[errors,setErrors]=useState({});
  const isEdit=!!expenseId;
  useEffect(()=>{if(isEdit)loadExpense()},[expenseId]);
  async function loadExpense(){const{data}=await sb.from('expenses').select('*').eq('id',expenseId).single();if(data){setForm({title:data.title,amount:data.amount,category:data.category,expense_date:data.expense_date,description:data.description||'',receipt_url:data.receipt_url||''});if(data.receipt_url)setPreview(data.receipt_url);}}
  function handleFile(e){const f=e.target.files[0];if(!f)return;setFile(f);setPreview(URL.createObjectURL(f));}
  async function uploadFile(){if(!file)return form.receipt_url;const ext=file.name.split('.').pop();const path=`receipts/${profile.id}/${Date.now()}.${ext}`;await sb.storage.from('receipts').upload(path,file);const{data:{publicUrl}}=sb.storage.from('receipts').getPublicUrl(path);return publicUrl;}
  function validate(){const e={};if(!form.title.trim())e.title='タイトルを入力してください';if(!form.amount)e.amount='金額を入力してください';if(!form.description.trim())e.description='備考を入力してください';setErrors(e);return Object.keys(e).length===0;}
  async function handleSubmit(submitForApproval){if(!validate())return;setLoading(true);try{const receipt_url=await uploadFile();const payload={...form,amount:Number(form.amount),receipt_url,user_id:profile.id,company:company||null,status:submitForApproval?'pending_office':'draft'};if(isEdit)await sb.from('expenses').update(payload).eq('id',expenseId);else await sb.from('expenses').insert(payload);onSave();}catch(e){alert('保存失敗: '+e.message);}setLoading(false);}
  return(<div className="page"><div style={{marginBottom:16}}><button className="btn btn-secondary" onClick={onCancel}>← 戻る</button></div><h2 style={{fontSize:18,fontWeight:700,marginBottom:4}}>{isEdit?'経費を編集':'経費を申請'}</h2>{company&&<p style={{fontSize:13,color:'#92400e',fontWeight:600,marginBottom:16}}>🏢 {company}</p>}<div className="card" style={{padding:20,marginBottom:16}}><div className="form-group"><label className="form-label">タイトル<span className="required">*</span></label><input className={`form-input ${errors.title?'error':''}`} value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="例: ルノアール"/>{errors.title&&<p className="err-text">{errors.title}</p>}</div><div className="form-grid"><div className="form-group"><label className="form-label">金額（円）<span className="required">*</span></label><input className={`form-input ${errors.amount?'error':''}`} type="number" min="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0"/>{errors.amount&&<p className="err-text">{errors.amount}</p>}</div><div className="form-group"><label className="form-label">日付<span className="required">*</span></label><input className="form-input" type="date" value={form.expense_date} onChange={e=>setForm(f=>({...f,expense_date:e.target.value}))}/></div></div><div className="form-group"><label className="form-label">カテゴリ<span className="required">*</span></label><select className="form-input" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{CATEGORIES.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}</select></div><div className="form-group"><label className="form-label">備考<span className="required">*</span></label><textarea className={`form-input ${errors.description?'error':''}`} rows={2} style={{resize:'none'}} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="備考を入力してください（必須）"/>{errors.description&&<p className="err-text">{errors.description}</p>}</div></div><div className="card" style={{padding:20,marginBottom:20}}><label className="form-label">領収書</label>{preview?(<div><img src={preview} className="receipt-preview" alt="領収書"/><br/><button className="btn btn-secondary btn-sm" style={{marginTop:8}} onClick={()=>{setPreview('');setFile(null);setForm(f=>({...f,receipt_url:''}));}}>🗑 削除</button></div>):(<label className="upload-area"><div className="upload-icon">📎</div><div className="upload-text">タップして画像を選択<br/><span style={{fontSize:11,color:'#94a3b8'}}>PNG, JPG, PDF</span></div><input type="file" style={{display:'none'}} accept="image/*,.pdf" onChange={handleFile}/></label>)}</div><div style={{display:'flex',gap:10}}><button className="btn btn-secondary" style={{flex:1,justifyContent:'center',padding:'12px'}} onClick={()=>handleSubmit(false)} disabled={loading}>下書き保存</button><button className="btn btn-primary" style={{flex:1,justifyContent:'center',padding:'12px'}} onClick={()=>handleSubmit(true)} disabled={loading}>{loading?'処理中...':'申請する'}</button></div></div>);
}

function BulkExpenseForm({profile,company,onSave,onCancel}){
  const[items,setItems]=useState([]);const[loading,setLoading]=useState(false);
  function addFiles(e){const files=Array.from(e.target.files);const newItems=files.map(f=>({file:f,preview:URL.createObjectURL(f),title:'',amount:'',category:'entertainment',expense_date:new Date().toISOString().slice(0,10),description:'',errors:{}}));setItems(prev=>[...prev,...newItems]);}
  function updateItem(idx,field,value){setItems(prev=>prev.map((item,i)=>i===idx?{...item,[field]:value,errors:{...item.errors,[field]:''}}:item));}
  function removeItem(idx){setItems(prev=>prev.filter((_,i)=>i!==idx));}
  function validate(){let valid=true;setItems(prev=>prev.map(item=>{const e={};if(!item.title.trim())e.title='必須';if(!item.amount)e.amount='必須';if(!item.description.trim())e.description='必須';if(Object.keys(e).length>0)valid=false;return{...item,errors:e};}));return valid;}
  async function handleSubmit(submitForApproval){if(items.length===0){alert('領収書を追加してください');return;}if(!validate())return;setLoading(true);try{for(const item of items){let receipt_url='';if(item.file){const ext=item.file.name.split('.').pop();const path=`receipts/${profile.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;await sb.storage.from('receipts').upload(path,item.file);const{data:{publicUrl}}=sb.storage.from('receipts').getPublicUrl(path);receipt_url=publicUrl;}await sb.from('expenses').insert({title:item.title,amount:Number(item.amount),category:item.category,expense_date:item.expense_date,description:item.description,receipt_url,user_id:profile.id,company:company||null,status:submitForApproval?'pending_office':'draft'});}onSave();}catch(e){alert('保存失敗: '+e.message);}setLoading(false);}

lassName="form-label">日付<span className="required">*</span></label><input className="form-input" type="date" value={item.expense_date} onChange={e=>updateItem(idx,'expense_date',e.target.value)}/></div></div><div className="form-group"><label className="form-label">カテゴリ<span className="required">*</span></label><select className="form-input" value={item.category} onChange={e=>updateItem(idx,'category',e.target.value)}>{CATEGORIES.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}</select></div><div className="form-group"><label className="form-label">備考<span className="required">*</span></label><input className={`form-input ${item.errors.description?'error':''}`} value={item.description} onChange={e=>updateItem(idx,'description',e.target.value)} placeholder="備考（必須）"/>{item.errors.description&&<p className="err-text">{item.errors.description}</p>}</div></div>))}{items.length>0&&(<div style={{display:'flex',gap:10,marginTop:8}}><button className="btn btn-secondary" style={{flex:1,justifyContent:'center',padding:'12px'}} onClick={()=>handleSubmit(false)} disabled={loading}>下書き保存</button><button className="btn btn-primary" style={{flex:1,justifyContent:'center',padding:'12px'}} onClick={()=>handleSubmit(true)} disabled={loading}>{loading?'登録中...':`${items.length}件を申請する`}</button></div>)}</div>);
}

function ExpenseDetail({profile,expenseId,onBack,onEdit}){
  const[expense,setExpense]=useState(null);const[logs,setLogs]=useState([]);const[comment,setComment]=useState('');const[loading,setLoading]=useState(false);

  if(!expense)return<div className="empty">読み込み中...</div>;

  const canEdit=profile.role==='staff'&&['draft','rejected'].includes(expense.status)&&expense.user_id===profile.id;
  const canDelete=isOffice;
  const steps=[{label:'申請',active:expense.status==='pending_office',done:['processing','approved'].includes(expense.status)},{label:'承認中',active:expense.status==='processing',done:expense.status==='approved',isProcessing:true},{label:'承認済み',active:false,done:expense.status==='approved'}];
  return(<div className="page"><div style={{marginBottom:16}}><button className="btn btn-secondary" onClick={onBack}>← 戻る</button></div><div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16}}><div><h2 style={{fontSize:17,fontWeight:700}}>{expense.title}</h2><div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>申請者: {expense.profiles?.name}{expense.company&&<span style={{color:'#92400e',fontWeight:600,marginLeft:6}}>[{expense.company}]</span>}</div></div><Badge status={expense.status}/></div>{expense.status!=='rejected'&&(<div className="approval-flow">{steps.map((s,i)=>(<React.Fragment key={i}><div className={`flow-step ${s.active?'active':''} ${s.done?'done':''} ${s.isProcessing&&s.active?'processing':''}`}><div className="flow-step-name">{s.done?'✅':s.active?(s.isProcessing?'🔄':'🔵'):'⭕'} {s.label}</div></div>{i<steps.length-1&&<span className="flow-arrow">→</span>}</React.Fragment>))}</div>)}<div className="card" style={{padding:16,marginBottom:12}}><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>{[['金額',fmt(expense.amount)],['カテゴリ',getCat(expense.category)],['日付',fmtDate(expense.expense_date)],['登録日',fmtDate(expense.created_at)]].map(([k,v])=>(<div key={k}><div style={{fontSize:11,color:'#94a3b8',marginBottom:2}}>{k}</div><div style={{fontSize:13,fontWeight:600}}>{v}</div></div>))}</div>{expense.description&&<div style={{marginTop:12,paddingTop:12,borderTop:'1px solid #f1f5f9'}}><div style={{fontSize:11,color:'#94a3b8',marginBottom:4}}>備考</div><div style={{fontSize:13}}>{expense.description}</div></div>}</div>{expense.batch_id&&<div className="card" style={{padding:14,marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}><span style={{fontSize:13,color:'#64748b'}}>📎 まとめPDFに含まれています</span>{expense.batch_pdf_url&&<a className="btn btn-secondary btn-sm" href={expense.batch_pdf_url} target="_blank" rel="noreferrer">📄 開く</a>}</div>}{expense.receipt_url&&(<div className="card" style={{padding:14,marginBottom:12}}><div style={{fontSize:11,color:'#94a3b8',marginBottom:8}}>領収書</div><a href={expense.receipt_url} target="_blank" rel="noreferrer"><img src={expense.receipt_url} className="receipt-preview" alt="領収書"/></a></div>)}{logs.length>0&&(<div className="card" style={{padding:16,marginBottom:12}}><div style={{fontSize:13,fontWeight:600,marginBottom:12}}>承認履歴</div>{logs.map(l=>(<div className="log-item" key={l.id}><div className="log-avatar">{l.profiles?.name?.[0]}</div><div className="log-content"><div className="log-meta"><span style={{fontWeight:600,color:'#374151'}}>{l.profiles?.name}</span>{' · '}<span className={`action-${l.action}`}>{l.action==='approve'?'承認':l.action==='reject'?'却下':l.action==='process'?'承認中へ':'申請'}</span></div>{l.comment&&<div className="log-comment">{l.comment}</div>}</div></div>))}</div>)}{(canProcess||canApprove||canReject||canSubmit||canEdit||canDelete)&&(<div className="card" style={{padding:16}}>
    {canProcess&&<button className="btn btn-warning" style={{width:'100%',justifyContent:'center',padding:'12px',marginBottom:10}} onClick={handlePDFAndProcess} disabled={loading}>📄 PDF出力 → 承認中へ</button>}
    {canApprove&&(<><textarea className="form-input" rows={2} style={{resize:'none',marginBottom:10}} value={comment} onChange={e=>setComment(e.target.value)} placeholder="コメント（任意）"/><button className="btn btn-success" style={{width:'100%',justifyContent:'center',padding:'12px',marginBottom:10}} onClick={()=>doAction('approve')} disabled={loading}>✅ 承認済みにする</button></>)}
    {canReject&&<button className="btn btn-danger" style={{width:'100%',justifyContent:'center',padding:'12px',marginBottom:10}} onClick={()=>doAction('reject')} disabled={loading}>❌ 却下</button>}
    {canSubmit&&<button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'12px',marginBottom:10}} onClick={()=>doAction('submit')} disabled={loading}>📤 申請する</button>}
    {canEdit&&(<div style={{display:'flex',gap:10,marginBottom:10}}><button className="btn btn-secondary" style={{flex:1,justifyContent:'center'}} onClick={()=>onEdit(expenseId)}>✏️ 編集</button><button className="btn btn-danger" style={{flex:1,justifyContent:'center'}} onClick={doDelete}>🗑 削除</button></div>)}
    {canDelete&&!canEdit&&!canProcess&&!canApprove&&!canReject&&<button className="btn btn-danger" style={{width:'100%',justifyContent:'center',padding:'12px'}} onClick={doDelete}>🗑 この申請を削除</button>}
  </div>)}</div>);
}

function ApprovalPage({profile,onSelect}){
  const[expenses,setExpenses]=useState([]);const[batches,setBatches]=useState([]);const[loading,setLoading]=useState(true);const[bundlingKey,setBundlingKey]=useState(null);
  useEffect(()=>{loadData()},[]);
  async function loadData(){
    const{data}=await sb.from('expenses').select('*,profiles(name)').in('status',['pending_office','processing']).order('created_at',{ascending:true});
    setExpenses(data||[]);
    const batchIds=[...new Set((data||[]).filter(e=>e.batch_id).map(e=>e.batch_id))];
    if(batchIds.length){const{data:bd}=await sb.from('pdf_batches').select('*').in('id',batchIds);setBatches(bd||[]);}else{setBatches([]);}
    setLoading(false);
  }
  const pending=expenses.filter(e=>e.status==='pending_office');
  const processing=expenses.filter(e=>e.status==='processing');
  const pendingGroups={};
  pending.forEach(e=>{const day=(e.created_at||e.expense_date||'').slice(0,10);const key=`${e.company||'—'}__${day}`;(pendingGroups[key]=pendingGroups[key]||{company:e.company,day,items:[]}).items.push(e);});
  const processingByBatch={};
  processing.forEach(e=>{const k=e.batch_id||'nobatch';(processingByBatch[k]=processingByBatch[k]||[]).push(e);});
  async function handleBundleGroup(items){
    setBundlingKey(items[0].id);
    try{
      const pdf_url=await generateAndUploadBatchPDF(items,profile.id);
      const{data:batch,error:bErr}=await sb.from('pdf_batches').insert({company:items[0].company,created_by:profile.id,pdf_url,status:'processing'}).select().single();
      if(bErr)throw bErr;
      const ids=items.map(e=>e.id);
      await sb.from('expenses').update({status:'processing',batch_id:batch.id}).in('id',ids);
      await sb.from('approval_logs').insert(items.map(e=>({expense_id:e.id,actor_id:profile.id,action:'process',comment:`${items.length}件まとめPDF（同日申請）`,from_status:'pending_office',to_status:'processing'})));
      await loadData();
    }catch(e){alert('まとめPDFの作成に失敗しました: '+e.message);}
    setBundlingKey(null);
  }
  async function approveBatch(batchId,items){
    setLoading(true);
    await sb.from('pdf_batches').update({status:'approved',approved_at:new Date().toISOString()}).eq('id',batchId);
    const ids=items.map(e=>e.id);
    await sb.from('expenses').update({status:'approved'}).in('id',ids);
    await sb.from('approval_logs').insert(items.map(e=>({expense_id:e.id,actor_id:profile.id,action:'approve',comment:'',from_status:'processing',to_status:'approved'})));
    await loadData();
  }
  async function rejectBatch(batchId,items){
    if(!confirm('このまとめPDFを差し戻しますか？（承認待ちに戻ります）'))return;
    setLoading(true);
    await sb.from('pdf_batches').update({status:'rejected'}).eq('id',batchId);
    const ids=items.map(e=>e.id);
    await sb.from('expenses').update({status:'pending_office',batch_id:null}).in('id',ids);
    await sb.from('approval_logs').insert(items.map(e=>({expense_id:e.id,actor_id:profile.id,action:'reject',comment:'まとめPDF差し戻し',from_status:'processing',to_status:'pending_office'})));
    await loadData();
  }
  return(<div className="page"><div className="page-header"><div><div className="page-title">承認中</div><div className="page-sub">対応が必要な申請</div></div></div>
    {loading&&<div className="empty">読み込み中...</div>}
    {!loading&&expenses.length===0&&<div className="card"><div className="empty">✅ 対応が必要な申請はありません</div></div>}
    {Object.keys(pendingGroups).length>0&&(<>
      <div style={{fontSize:13,fontWeight:600,color:'#854d0e',marginBottom:8}}>⏳ 承認待ち（同日申請は自動でまとめられます）</div>
      {Object.entries(pendingGroups).map(([key,group])=>{
        const total=group.items.reduce((s,e)=>s+e.amount,0);
        const isBundling=bundlingKey===group.items[0].id;
        return(<div className="batch-card" key={key}>
          <div className="batch-card-header">
            <span className="batch-card-title">{group.company?.replace('株式会社','')||'—'} ／ {fmtDate(group.day)}申請（{group.items.length}件・{fmt(total)}）</span>
            <button className="btn btn-warning btn-sm" onClick={()=>handleBundleGroup(group.items)} disabled={isBundling}>{isBundling?'PDF作成中...':group.items.length>1?'📄 まとめて承認中へ':'📄 承認中へ'}</button>
          </div>
          <div className="batch-card-body">{group.items.map(e=>(<div className="expense-row" key={e.id} style={{cursor:'pointer'}} onClick={()=>onSelect(e.id)}><span className="expense-name">{e.profiles?.name||''}</span><span className="expense-title">{e.title}</span><span className="expense-amount">{fmt(e.amount)}</span></div>))}</div>
        </div>);
      })}
    </>)}
    {Object.keys(processingByBatch).length>0&&(<>
      <div style={{fontSize:13,fontWeight:600,color:'#1d4ed8',marginBottom:8}}>🔄 承認中</div>
      {Object.entries(processingByBatch).map(([batchKey,items])=>{
        const batch=batches.find(b=>b.id===batchKey);
        const total=items.reduce((s,e)=>s+e.amount,0);
        return(<div className="batch-card" key={batchKey}>
          <div className="batch-card-header">
            <span className="batch-card-title">{items[0].company?.replace('株式会社','')} まとめ（{items.length}件・{fmt(total)}）</span>
            <div style={{display:'flex',gap:8}}>
              {batch?.pdf_url&&<a className="btn btn-secondary btn-sm" href={batch.pdf_url} target="_blank" rel="noreferrer">📄 PDF</a>}
              <button className="btn btn-danger btn-sm" onClick={()=>rejectBatch(batchKey,items)}>差し戻し</button>
              <button className="btn btn-success btn-sm" onClick={()=>approveBatch(batchKey,items)}>✅ 承認済みにする</button>
            </div>
          </div>
          <div className="batch-card-body">{items.map(e=>(<div className="expense-row" key={e.id} style={{cursor:'pointer'}} onClick={()=>onSelect(e.id)}><span className="expense-name">{e.profiles?.name||''}</span><span className="expense-title">{e.title}</span><span className="expense-amount">{fmt(e.amount)}</span></div>))}</div>
        </div>);
      })}
    </>)}
  </div>);
}

function ArchivePage({profile}){
  const[expenses,setExpenses]=useState([]);const[loading,setLoading]=useState(true);const[monthFilter,setMonthFilter]=useState('');const[companyFilter,setCompanyFilter]=useState('');const[actingKey,setActingKey]=useState(null);
  useEffect(()=>{loadData()},[monthFilter,companyFilter]);

                {b?.pdf_url&&<a className="btn btn-secondary btn-sm" href={b.pdf_url} target="_blank" rel="noreferrer">📄 PDFを開く</a>}
                {profile.role==='office'&&(<>
                  <button className="btn btn-danger btn-sm" onClick={()=>rejectBatch(batchId,items)} disabled={acting}>❌ 非承認</button>
                  <button className="btn btn-success btn-sm" onClick={()=>approveBatch(batchId,items)} disabled={acting}>✅ 承認</button>
                </>)}
              </div>
            </div>
            <div className="batch-card-body">{items.map(e=>(<div className="expense-row" key={e.id} style={{cursor:'default'}}><span className="expense-name">{e.profiles?.name||''}</span><span className="expense-title">{e.title}</span><span className="expense-amount">{fmt(e.amount)}</span></div>))}</div>
          </div>);
        })}
      </>)}
      {approvedGroups.length>0&&(<>
        <div style={{fontSize:13,fontWeight:600,color:'#15803d',marginBottom:8}}>✅ 承認済み</div>
        {approvedGroups.map(([batchId,items])=>{
          const b=items[0]._batch;
          const t=items.reduce((s,e)=>s+e.amount,0);
          return(<div className="batch-card" key={batchId}>
            <div className="batch-card-header">
              <span className="batch-card-title">{items[0].company?.replace('株式会社','')} まとめPDF（{items.length}件・{fmt(t)}）{b?.approved_at?` ／ 承認日 ${fmtDate(b.approved_at)}`:''}</span>
              {b?.pdf_url&&<a className="btn btn-secondary btn-sm" href={b.pdf_url} target="_blank" rel="noreferrer">📄 PDFを開く</a>}
            </div>
            <div className="batch-card-body">{items.map(e=>(<div className="expense-row" key={e.id} style={{cursor:'default'}}><span className="expense-name">{e.profiles?.name||''}</span><span className="expense-title">{e.title}</span><span className="expense-amount">{fmt(e.amount)}</span></div>))}</div>
          </div>);
        })}
      </>)}
      {standalone.length>0&&(<div className="table-wrap">{standalone.map(e=>(<div className="expense-row" key={e.id} style={{cursor:'default'}}><span className="expense-company">{e.company?.replace('株式会社','')||'—'}</span><span className="expense-name">{e.profiles?.name||''}</span><span className="expense-title">{e.title}</span><span className="expense-amount">{fmt(e.amount)}</span><Badge status={e.status}/><button className="btn btn-secondary btn-sm" onClick={()=>generatePDF(e)}>📄 PDF</button></div>))}</div>)}
    </>)}
  </div>);
}

function ReportPage({profile}){
  const[month,setMonth]=useState(new Date().toISOString().slice(0,7));const[expenses,setExpenses]=useState([]);const[loading,setLoading]=useState(true);const[companyFilter,setCompanyFilter]=useState('');
  useEffect(()=>{loadData()},[month,companyFilter]);
  async function loadData(){setLoading(true);const start=month+'-01';const end=new Date(new Date(start).getFullYear(),new Date(start).getMonth()+1,0).toISOString().slice(0,10);let q=sb.from('expenses').select('*').gte('expense_date',start).lte('expense_date',end).eq('status','approved');if(profile.role==='staff')q=q.eq('user_id',profile.id);if(companyFilter)q=q.eq('company',companyFilter);const{data}=await q;setExpenses(data||[]);setLoading(false);}
  const total=expenses.reduce((s,e)=>s+e.amount,0);
  const byCat=CATEGORIES.map((cat,i)=>{const amount=expenses.filter(e=>e.category===cat.value).reduce((s,e)=>s+e.amount,0);return{...cat,amount,color:CAT_COLORS[i%CAT_COLORS.length],pct:total?Math.round(amount/total*100):0};}).filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount);
  const months=Array.from({length:12},(_,i)=>{const d=new Date();d.setMonth(d.getMonth()-i);return{value:d.toISOString().slice(0,7),label:`${d.getFullYear()}年${d.getMonth()+1}月`};});
  const r=60,cx=80,cy=80,circ=2*Math.PI*r;let offset=0;
  const arcs=byCat.map(cat=>{const dash=(cat.pct/100)*circ;const el={cat,dash,offset};offset+=dash;return el;});
  return(<div className="page"><div className="page-header"><div className="page-title">月次レポート</div><div style={{display:'flex',gap:8,flexWrap:'wrap'}}><select className="form-input" style={{width:140,fontSize:13}} value={month} onChange={e=>setMonth(e.target.value)}>{months.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}</select><select className="form-input" style={{width:140,fontSize:13}} value={companyFilter} onChange={e=>setCompanyFilter(e.target.value)}><option value="">全法人</option>{COMPANIES.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}</select></div></div>{loading?<div className="empty">読み込み中...</div>:expenses.length===0?<div className="empty">この月の承認済み経費はありません</div>:(<><div className="card" style={{padding:16,marginBottom:12}}><div style={{fontSize:12,color:'#64748b',marginBottom:4}}>承認済み合計</div><div style={{fontSize:28,fontWeight:700}}>{fmt(total)}</div><div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>{expenses.length}件</div></div>{byCat.length>0&&(<div className="card" style={{padding:16,marginBottom:12}}><div style={{fontSize:13,fontWeight:600,marginBottom:14}}>カテゴリ別</div><div className="donut-wrap"><svg width="160" height="160">{arcs.map(({cat,dash,offset})=>(<circle key={cat.value} cx={cx} cy={cy} r={r} fill="none" stroke={cat.color} strokeWidth="20" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-offset}/>))}<text x={cx} y={cy-6} textAnchor="middle" fill="#64748b" fontSize="11">合計</text><text x={cx} y={cy+10} textAnchor="middle" fill="#0f172a" fontSize="13" fontWeight="bold">{new Intl.NumberFormat('ja-JP',{notation:'compact'}).format(total)}円</text></svg><div className="legend">{byCat.map(cat=>(<div className="legend-item" key={cat.value}><div className="legend-dot" style={{background:cat.color}}/><span className="legend-label">{cat.label}</span><span className="legend-pct">{cat.pct}%</span><span className="legend-amt">{fmt(cat.amount)}</span></div>))}</div></div></div>)}<div className="table-wrap">{expenses.sort((a,b)=>new Date(a.expense_date)-new Date(b.expense_date)).map(e=>(<div className="expense-row" key={e.id} style={{cursor:'default'}}><span className="expense-company">{e.company?.replace('株式会社','')||'—'}</span><span className="expense-title">{e.title}</span><span className="expense-amount">{fmt(e.amount)}</span></div>))}</div></>)}</div>);
}

function App(){
  const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);const[company,setCompany]=useState(null);const[authLoading,setAuthLoading]=useState(true);const[showCompanySelect,setShowCompanySelect]=useState(false);const[page,setPage]=useState('dashboard');const[selectedId,setSelectedId]=useState(null);const[editId,setEditId]=useState(null);const[drawerOpen,setDrawerOpen]=useState(false);
  useEffect(()=>{sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user||null);if(session?.user)loadProfile(session.user.id);else setAuthLoading(false);});const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setUser(session?.user||null);if(session?.user)loadProfile(session.user.id);else{setProfile(null);setCompany(null);setShowCompanySelect(false);setAuthLoading(false);}});return()=>subscription.unsubscribe();},[]);
  async function loadProfile(uid){const{data}=await sb.from('profiles').select('*').eq('id',uid).single();setProfile(data);setAuthLoading(false);}
  function handleLogin(prof){setProfile(prof);if(prof.role==='staff')setShowCompanySelect(true);}
  function handleCompanySelect(c){setCompany(c);setShowCompanySelect(false);}
  async function logout(){await sb.auth.signOut();setPage('dashboard');setSelectedId(null);setEditId(null);setCompany(null);setShowCompanySelect(false);}
  function goPage(p){setPage(p);setSelectedId(null);setEditId(null);setDrawerOpen(false);}
  if(authLoading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#94a3b8'}}>読み込み中...</div>;
  if(!user||!profile)return<Login onLogin={handleLogin}/>;
  if(showCompanySelect)return<CompanySelect profile={profile} onSelect={handleCompanySelect}/>;
  const isOffice=profile.role==='office';
  const navItems=[{key:'dashboard',icon:'🏠',label:'ホーム'},{key:'expenses',icon:'📋',label:'経費一覧'},...(isOffice?[{key:'approvals',icon:'🔄',label:'承認中'}]:[]),{key:'archive',icon:'🗂',label:'アーカイブ'},{key:'reports',icon:'📊',label:'レポート'}];
  const pageTitles={dashboard:'ダッシュボード',expenses:'経費一覧',approvals:'承認中',archive:'アーカイブ',reports:'月次レポート',detail:'経費詳細',form:editId?'経費を編集':'経費を申請',bulk:'一括申請'};
  function renderPage(){
    if(page==='detail'&&selectedId)return<ExpenseDetail profile={profile} expenseId={selectedId} onBack={()=>{setPage('expenses');setSelectedId(null);}} onEdit={id=>{setEditId(id);setPage('form');}}/>;
    if(page==='form')return<ExpenseForm profile={profile} company={company} expenseId={editId} onSave={()=>{setPage('expenses');setEditId(null);}} onCancel={()=>{setPage('expenses');setEditId(null);}}/>;
    if(page==='bulk')return<BulkExpenseForm profile={profile} company={company} onSave={()=>setPage('expenses')} onCancel={()=>setPage('expenses')}/>;
    if(page==='expenses')return<ExpenseList profile={profile} company={company} onSelect={id=>{setSelectedId(id);setPage('detail');}} onNew={()=>{setEditId(null);setPage('form');}} onBulk={()=>setPage('bulk')}/>;
    if(page==='approvals')return<ApprovalPage profile={profile} onSelect={id=>{setSelectedId(id);setPage('detail');}}/>;
    if(page==='archive')return<ArchivePage profile={profile}/>;
    if(page==='reports')return<ReportPage profile={profile}/>;
    return<Dashboard profile={profile} company={company}/>;
  }
  const SidebarContent=()=>(<><div className="sidebar-logo"><div className="logo-icon">🧾</div><div><div className="logo-text">うま味経費</div><div className="logo-sub">Expense Manager</div></div></div><nav>{navItems.map(n=>(<button key={n.key} className={`nav-item ${page===n.key?'active':''}`} onClick={()=>goPage(n.key)}><span>{n.icon}</span>{n.label}</button>))}</nav><div className="sidebar-user"><div className="user-info"><div className="user-avatar">{profile.name[0]}</div><div><div className="user-name">{profile.name}</div><span className={`role-badge ${ROLE_BADGE[profile.role]||'role-staff'}`}>{ROLE_LABELS[profile.role]||profile.role}</span>{company&&<span className="company-badge" style={{display:'block',marginTop:3}}>{company.replace('株式会社','㈱')}</span>}</div></div><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{profile.role==='staff'&&<button className="btn btn-secondary btn-sm" onClick={()=>setShowCompanySelect(true)}>🏢 切替</button>}<button className="logout-btn" onClick={logout}>🚪 ログアウト</button></div></div></>);
  return(<div className="app"><aside className="sidebar"><SidebarContent/></aside><div className={`sidebar-overlay ${drawerOpen?'open':''}`} onClick={()=>setDrawerOpen(false)}/><div className={`sidebar-drawer ${drawerOpen?'open':''}`}><SidebarContent/></div><div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><div className="mobile-header"><button className="hamburger" onClick={()=>setDrawerOpen(true)}>☰</button><span className="mobile-header-title">{pageTitles[page]||'うま味経費'}</span><div style={{width:32}}/></div><main className="main">{renderPage()}</main></div><nav className="bottom-nav"><div className="bottom-nav-items">{navItems.map(n=>(<button key={n.key} className={`bottom-nav-item ${page===n.key?'active':''}`} onClick={()=>goPage(n.key)}><span>{n.icon}</span><span>{n.label}</span></button>))}</div></nav>{profile.role==='staff'&&!['form','bulk'].includes(page)&&(<button className="fab" onClick={()=>setPage('bulk')}>📷</button>)}</div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
